<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPZ Orçamento Inteligente</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

:root {
    --bg:        #0f1115;
    --surface:   #181b20;
    --border:    #272b33;
    --border2:   #2f3540;
    --blue:      #0A84FF;
    --blue-dim:  #17324f;
    --text:      #ffffff;
    --muted:     #8f98a8;
    --label:     #c7ced8;
    --item-bg:   #23272f;
    --ok:        #14532d;
    --warn:      #854d0e;
    --danger:    #7f1d1d;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', Arial, sans-serif;
    padding: 16px;
}

.container {
    max-width: 480px;
    margin: auto;
    background: var(--surface);
    padding: 18px;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 18px 45px rgba(0,0,0,0.35);
}

.topo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
}
.topo h2 { margin: 2px 0 0; font-size: 25px; }
.subtitulo { margin: 0; color: var(--muted); font-size: 13px; }
.logo-empresa {
    width: 190px; max-width: 52%; height: auto;
    border-radius: 8px; background: #fff;
    padding: 5px;
    box-shadow: 0 8px 18px rgba(10,132,255,0.22);
}

.container > label,
.linha-dupla label,
.secao-titulo {
    display: block;
    color: var(--label);
    font-size: 13px;
    font-weight: bold;
    margin-top: 16px;
    margin-bottom: 8px;
}

input[type="number"] {
    width: 100%;
    min-height: 44px;
    padding: 11px 12px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    font-family: 'DM Sans', Arial, sans-serif;
    background: var(--item-bg);
    color: var(--text);
}
input[type="number"]:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(10,132,255,0.2);
}

/* ── BUSCA CUSTOMIZADA ── */
.busca-wrapper {
    position: relative;
    flex: 1;
    min-width: 0;
}
.busca-input {
    width: 100%;
    min-height: 44px;
    padding: 11px 12px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    font-family: 'DM Sans', Arial, sans-serif;
    background: var(--item-bg);
    color: var(--text);
    cursor: pointer;
}
.busca-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(10,132,255,0.2);
    cursor: text;
}
.busca-input::placeholder { color: var(--muted); font-size: 13px; }
.busca-input.selecionado { color: var(--text); }

.busca-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: #1e2229;
    border: 1px solid var(--blue);
    border-radius: 8px;
    max-height: 260px;
    overflow-y: auto;
    z-index: 999;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.busca-dropdown.aberto { display: block; }

.busca-grupo-label {
    padding: 6px 12px 3px;
    font-size: 11px;
    font-weight: bold;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: #181b20;
    position: sticky;
    top: 0;
}
.busca-opcao {
    padding: 10px 12px;
    font-size: 13px;
    color: var(--label);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    line-height: 1.3;
}
.busca-opcao:last-child { border-bottom: none; }
.busca-opcao:hover, .busca-opcao.ativo {
    background: var(--blue-dim);
    color: white;
}
.busca-opcao .opcao-codigo {
    font-size: 11px;
    color: var(--muted);
    display: block;
}
.busca-opcao .opcao-preco {
    font-size: 11px;
    color: #4ade80;
    float: right;
    margin-left: 8px;
}
.busca-vazio {
    padding: 14px 12px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
}

/* ── OPCOES PROJETO ── */
.opcoes-projeto {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 10px;
}
.opcao-projeto {
    display: flex; align-items: center; gap: 10px;
    min-height: 46px;
    background: var(--item-bg);
    border: 1px solid var(--border2);
    padding: 12px; border-radius: 8px;
    cursor: pointer; font-weight: bold;
}
.opcao-projeto input {
    width: 18px; height: 18px; margin: 0;
    accent-color: var(--blue);
}
.opcao-projeto:has(input:checked) {
    outline: 2px solid var(--blue);
    border-color: var(--blue);
    background: var(--blue-dim);
}

.secao {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid #2b3038;
}
.secao-titulo { margin-top: 0; }

.produtos-grid { display: grid; gap: 10px; }

.produto-linha {
    display: grid;
    grid-template-columns: 34px minmax(0,1fr) 72px 36px;
    gap: 10px; align-items: center;
}
.infra-linha {
    display: grid;
    grid-template-columns: minmax(0,1fr) 72px 36px;
    gap: 10px; align-items: center;
}
.produtos-cabecalho { color: #aaa; font-size: 13px; }
.produto-numero {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px;
    background: #2b3038; border-radius: 8px;
    color: #ddd; font-weight: bold;
}
.produto-qtd { text-align: center; }
.botao-remover {
    width: 36px; height: 36px; min-height: 36px;
    margin: 0; padding: 0;
    background: #2b3038; color: #cfd6e3;
    font-size: 20px; line-height: 1;
}
.botao-remover:hover { background: #7f1d1d; color: white; filter: none; }

.linha-total-cameras {
    display: flex; align-items: center;
    justify-content: space-between;
    gap: 14px; margin-top: 14px;
    padding: 10px 12px;
    background: var(--item-bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
}
.linha-total-cameras span:first-child {
    color: var(--label); font-size: 13px; font-weight: bold;
}
.campo-automatico {
    display: flex; align-items: center; justify-content: center;
    min-width: 58px; height: 40px;
    background: #2a2a2a; color: white;
    font-weight: bold; border-radius: 8px; font-size: 18px;
}
.campo-automatico.nivel-facil   { background: var(--ok); }
.campo-automatico.nivel-medio   { background: var(--warn); }
.campo-automatico.nivel-dificil { background: var(--danger); }

.linha-dupla {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-top: 6px;
}

button {
    width: 100%; min-height: 44px;
    padding: 12px; margin-top: 16px;
    border: none; border-radius: 8px;
    background: var(--blue); color: white;
    font-size: 16px; font-weight: bold;
    cursor: pointer;
    font-family: 'DM Sans', Arial, sans-serif;
}
button:hover { filter: brightness(1.08); }
.botao-adicionar { margin-top: 12px; background: #16803a; }
.botao-pagamento { background: #f4f7fb; color: #151922; margin-top: 12px; }
.botao-limpar { background: transparent; color: var(--muted); border: 1px solid var(--border2); margin-top: 8px; font-size: 14px; }
.botao-limpar:hover { border-color: #ef4444; color: #ef4444; filter: none; }

.resultado {
    margin-top: 18px;
    background: var(--blue); color: white;
    padding: 18px; border-radius: 10px;
    font-size: 30px; font-weight: bold; line-height: 1.1;
    box-shadow: 0 12px 24px rgba(10,132,255,0.25);
}
.resultado span {
    display: block; margin-bottom: 6px;
    color: #dceeff; font-size: 13px; font-weight: bold;
}
.info { margin-top: 12px; color: #aaa; line-height: 1.5; }
.info-resumo { display: grid; gap: 6px; margin-top: 14px; color: #cfcfcf; font-size: 14px; }
.info-linha {
    display: flex; justify-content: space-between; gap: 12px;
    border-bottom: 1px solid #2f2f2f; padding-bottom: 6px;
}
.info-linha:last-child { border-bottom: none; padding-bottom: 0; }

@media (max-width: 420px) {
    body { padding: 10px; }
    .container { padding: 14px; }
    .produto-linha { grid-template-columns: 32px minmax(0,1fr) 62px 32px; gap: 8px; }
    .infra-linha   { grid-template-columns: minmax(0,1fr) 62px 32px; gap: 8px; }
    .opcoes-projeto { gap: 8px; }
}

</style>
</head>
<body>

<div class="container">

    <div class="topo">
        <div>
            <h2>Orçamento rápido</h2>
            <p class="subtitulo">CPZ Digital</p>
        </div>
        <img class="logo-empresa" src="cpz-logo.png" alt="CPZ Digital">
    </div>

    <label>Tipo do Projeto</label>
    <div class="opcoes-projeto">
        <label class="opcao-projeto">
            <input type="checkbox" name="tipo" value="analogica" checked> Analógica
        </label>
        <label class="opcao-projeto">
            <input type="checkbox" name="tipo" value="ip"> IP
        </label>
        <label class="opcao-projeto">
            <input type="checkbox" name="tipo" value="wifi"> Wi-Fi
        </label>
        <label class="opcao-projeto">
            <input type="checkbox" name="tipo" value="automacao"> Automação
        </label>
        <label class="opcao-projeto">
            <input type="checkbox" name="tipo" value="sensores"> Sensores
        </label>
        <label class="opcao-projeto">
            <input type="checkbox" id="usarSocio"> Apoio técnico
        </label>
    </div>

    <div class="linha-total-cameras">
        <span>Total de câmeras</span>
        <span id="totalCameras" class="campo-automatico">0</span>
    </div>

    <!-- PRODUTOS -->
    <div class="secao">
        <label class="secao-titulo">Itens do projeto</label>
        <div class="produto-linha produtos-cabecalho">
            <span>Nº</span><span>Produto</span><span>Qtd.</span><span></span>
        </div>
        <div class="produtos-grid" id="listaProdutos"></div>
        <button type="button" class="botao-adicionar" onclick="adicionarProduto()">+ Adicionar item</button>
    </div>

    <!-- INFRAESTRUTURA -->
    <div class="secao">
        <label class="secao-titulo">Infraestrutura</label>
        <div class="infra-linha produtos-cabecalho">
            <span>Item</span><span>Qtd.</span><span></span>
        </div>
        <div class="produtos-grid" id="listaInfra"></div>
        <button type="button" class="botao-adicionar" onclick="adicionarInfra()">+ Adicionar item</button>
    </div>

    <div class="linha-dupla">
        <div>
            <label>Dias de trabalho</label>
            <input type="number" id="diasTrabalho" min="0" value="1">
        </div>
        <div>
            <label>Dias com diarista</label>
            <input type="number" id="diasDiarista" min="0" value="1">
        </div>
    </div>

    <div class="resultado" id="resultado">
        <span>Valor final do projeto</span>R$ 0,00
    </div>

    <div class="info" id="info"></div>

    <button type="button" class="botao-pagamento" onclick="abrirPagamentos()">Ver formas de pagamento</button>
    <button type="button" class="botao-limpar" onclick="limparOrcamento()">🗑 Novo orçamento</button>

</div>

<script>

const URL_PRODUTOS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg5zxUiq6B03q8unGatN0ATJz1aLR89j34Xe3Z0-a8DFQyh3k-HpZsMngRxVTyrK9quopeBKCHTGlw/pub?gid=1778121456&single=true&output=csv";
const URL_INFRA    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg5zxUiq6B03q8unGatN0ATJz1aLR89j34Xe3Z0-a8DFQyh3k-HpZsMngRxVTyrK9quopeBKCHTGlw/pub?gid=1725487429&single=true&output=csv";

let produtos   = [];
let itensInfra = [];

const ordemCategorias = [
    "Câmeras","Gravadores","Armazenamento","Cabos",
    "Infraestrutura","Rede","Energia","Automação","Acessórios"
];

function formatarMoeda(v) {
    return v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

function simplificarNome(nome) {
    return nome.trim().replace(/\s+/g, " ")
        .replace(/CAMERA/gi, "Câmera").replace(/ANALOGICA/gi, "analógica")
        .replace(/BRANCA/gi, "branca").replace(/PRETA/gi, "preta")
        .replace(/CAIXA DE PASSAGEM/gi, "caixa de passagem")
        .replace(/CONVERSOR AUTOMATICO/gi, "Conversor automático")
        .replace(/PROTETOR ELETRONICO/gi, "Protetor eletrônico")
        .replace(/SWITCH NAO GERENCIAVEL/gi, "Switch não gerenciável")
        .replace(/INTERRUPTOR/gi, "Interruptor").replace(/CARTAO/gi, "Cartão")
        .replace(/CABO/gi, "Cabo").replace(/MINI RACK/gi, "Mini rack")
        .replace(/NOBREAK/gi, "Nobreak").replace(/CANAIS/gi, "canais")
        .replace(/PORTAS/gi, "portas").replace(/TOMADAS/gi, "tomadas")
        .replace(/PACOTE COM/gi, "pacote com").replace(/UNIDADES/gi, "unidades")
        .replace(/BORNE DE PARAFUSO/gi, "borne de parafuso")
        .replace(/ALIMENTACAO/gi, "alimentação").replace(/ALIMENTAÇÃO/gi, "alimentação")
        .replace(/p\/SEGURANCA ELETRONICA/gi, "para segurança eletrônica")
        .replace(/SEGURANCA ELETRONICA/gi, "segurança eletrônica")
        .replace(/P\/RACK/gi, "para rack").replace(/S\/FIO/gi, "sem fio")
        .replace(/s\/HD/g, "sem HD").replace(/c\/HD/g, "com HD")
        .replace(/c\/MICROSD/gi, "com MicroSD").replace(/\s*-\s*/g, " - ");
}

function categoriaProduto(codigo) {
    if (codigo.startsWith("CAM-"))                              return "Câmeras";
    if (codigo.startsWith("DVR") || codigo.startsWith("NVR"))  return "Gravadores";
    if (codigo.startsWith("ARM-"))                             return "Armazenamento";
    if (codigo.startsWith("CAB-"))                             return "Cabos";
    if (codigo.startsWith("INF-"))                             return "Infraestrutura";
    if (codigo.startsWith("SW")  || codigo.startsWith("RED-")) return "Rede";
    if (codigo.startsWith("ENG-"))                             return "Energia";
    if (codigo.startsWith("AUT-"))                             return "Automação";
    return "Acessórios";
}

function pegarValorProduto(codigo) {
    const p = produtos.find(i => i.codigo === codigo);
    return p ? p.valor : 0;
}

function pegarValorInfra(nome) {
    const p = itensInfra.find(i => i.nome === nome);
    return p ? p.valor : 0;
}

// ── PARSER CSV ──
function parseCsv(texto, temCodigo) {
    const linhas = texto.trim().split(/\r?\n/);
    if (linhas.length < 2) return [];
    const sep = linhas[0].includes(";") ? ";" : ",";
    const resultado = [];
    for (let i = 1; i < linhas.length; i++) {
        const linha = linhas[i].trim();
        if (!linha) continue;
        const campos = [];
        let atual = "", dentroAspas = false;
        for (let c = 0; c < linha.length; c++) {
            if (linha[c] === '"') { dentroAspas = !dentroAspas; }
            else if (linha[c] === sep && !dentroAspas) { campos.push(atual.trim()); atual = ""; }
            else { atual += linha[c]; }
        }
        campos.push(atual.trim());
        if (temCodigo) {
            if (campos.length < 3) continue;
            const codigo = campos[0].replace(/^"|"$/g, "").trim();
            const nome   = campos[1].replace(/^"|"$/g, "").trim();
            const valor  = parseFloat(campos[2].replace(/^"|"$/g, "").replace(",", ".").trim());
            if (!codigo || !nome || isNaN(valor)) continue;
            resultado.push({ codigo, nome: simplificarNome(nome), valor });
        } else {
            if (campos.length < 5) continue;
            const nome  = campos[1].replace(/^"|"$/g, "").trim();
            const valor = parseFloat(campos[4].replace(/^"|"$/g, "").replace(",", ".").replace(/[^\d.]/g, "").trim());
            if (!nome || isNaN(valor)) continue;
            resultado.push({ nome: simplificarNome(nome), valor });
        }
    }
    return resultado;
}

// ── CARREGAR BANCO ──
async function carregarBanco() {
    try {
        const rProd = await fetch(URL_PRODUTOS);
        if (rProd.ok) {
            const lista = parseCsv(await rProd.text(), true);
            if (lista.length > 0) produtos = lista;
        }
    } catch(e) { console.error("Erro produtos:", e.message); }

    try {
        const rInfra = await fetch(URL_INFRA);
        if (rInfra.ok) {
            const lista = parseCsv(await rInfra.text(), false);
            if (lista.length > 0) itensInfra = lista;
        }
    } catch(e) { console.error("Erro infra:", e.message); }
}

// ══════════════════════════════════════════════
// COMPONENTE DE BUSCA CUSTOMIZADO
// ══════════════════════════════════════════════

function criarBusca(opcoes, placeholder, valorInicial, onSelect) {
    // opcoes: [{valor, label, sublabel, grupo}]
    let valorAtual = valorInicial || "";
    let dropAberto = false;
    let idxAtivo   = -1;
    let opcoesVisiveis = [];

    const wrapper  = document.createElement("div");
    wrapper.className = "busca-wrapper";

    const input = document.createElement("input");
    input.type = "text";
    input.className = "busca-input";
    input.placeholder = placeholder;
    input.autocomplete = "off";

    const dropdown = document.createElement("div");
    dropdown.className = "busca-dropdown";

    wrapper.appendChild(input);
    wrapper.appendChild(dropdown);

    // Preenche com o valor inicial
    if (valorInicial) {
        const opt = opcoes.find(o => o.valor === valorInicial);
        if (opt) { input.value = opt.label; input.dataset.valor = opt.valor; }
    }

    function renderDropdown(filtro) {
        dropdown.innerHTML = "";
        opcoesVisiveis = [];
        idxAtivo = -1;

        const termo = filtro.toLowerCase();
        let grupoAtual = null;

        opcoes.forEach(opt => {
            const match = !termo ||
                opt.label.toLowerCase().includes(termo) ||
                (opt.sublabel || "").toLowerCase().includes(termo) ||
                (opt.grupo || "").toLowerCase().includes(termo);
            if (!match) return;

            if (opt.grupo && opt.grupo !== grupoAtual) {
                grupoAtual = opt.grupo;
                const g = document.createElement("div");
                g.className = "busca-grupo-label";
                g.textContent = opt.grupo;
                dropdown.appendChild(g);
            }

            const el = document.createElement("div");
            el.className = "busca-opcao";
            el.innerHTML = `
                <span class="opcao-preco">${opt.preco || ""}</span>
                ${opt.sublabel ? `<span class="opcao-codigo">${opt.sublabel}</span>` : ""}
                ${opt.label}
            `;
            el.addEventListener("mousedown", (e) => {
                e.preventDefault();
                selecionar(opt);
            });
            dropdown.appendChild(el);
            opcoesVisiveis.push({ el, opt });
        });

        if (opcoesVisiveis.length === 0) {
            const vazio = document.createElement("div");
            vazio.className = "busca-vazio";
            vazio.textContent = termo ? "Nenhum item encontrado" : "Nenhum item disponível";
            dropdown.appendChild(vazio);
        }
    }

    function abrirDropdown() {
        renderDropdown(input.value === opcoes.find(o => o.valor === input.dataset.valor)?.label ? "" : input.value);
        // Abre pra cima se o campo estiver no terço inferior da tela
        const rect = input.getBoundingClientRect();
        const espacoAbaixo = window.innerHeight - rect.bottom;
        if (espacoAbaixo < 280) {
            dropdown.style.top = "auto";
            dropdown.style.bottom = "calc(100% + 4px)";
        } else {
            dropdown.style.top = "calc(100% + 4px)";
            dropdown.style.bottom = "auto";
        }
        dropdown.classList.add("aberto");
        dropAberto = true;
    }

    function fecharDropdown() {
        dropdown.classList.remove("aberto");
        dropAberto = false;
        // Restaura o label do item selecionado se o campo estiver vazio ou diferente
        if (input.dataset.valor) {
            const opt = opcoes.find(o => o.valor === input.dataset.valor);
            if (opt) input.value = opt.label;
        } else {
            input.value = "";
        }
    }

    function selecionar(opt) {
        valorAtual = opt.valor;
        input.value = opt.label;
        input.dataset.valor = opt.valor;
        input.blur(); // fecha teclado no mobile
        fecharDropdown();
        onSelect(opt.valor);
    }

    input.addEventListener("focus", () => {
        input.select();
        abrirDropdown();
    });

    input.addEventListener("input", () => {
        input.dataset.valor = "";
        valorAtual = "";
        abrirDropdown();
        renderDropdown(input.value);
        onSelect("");
    });

    input.addEventListener("blur", () => {
        setTimeout(fecharDropdown, 150);
    });

    input.addEventListener("keydown", (e) => {
        if (!dropAberto) return;
        if (e.key === "ArrowDown") {
            e.preventDefault();
            idxAtivo = Math.min(idxAtivo + 1, opcoesVisiveis.length - 1);
            atualizarAtivo();
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            idxAtivo = Math.max(idxAtivo - 1, 0);
            atualizarAtivo();
        } else if (e.key === "Enter") {
            e.preventDefault();
            if (idxAtivo >= 0 && opcoesVisiveis[idxAtivo]) {
                selecionar(opcoesVisiveis[idxAtivo].opt);
            }
        } else if (e.key === "Escape") {
            fecharDropdown();
        }
    });

    function atualizarAtivo() {
        opcoesVisiveis.forEach((o, i) => {
            o.el.classList.toggle("ativo", i === idxAtivo);
            if (i === idxAtivo) o.el.scrollIntoView({ block: "nearest" });
        });
    }

    // Expõe o valor atual para leitura externa
    wrapper.getValor = () => input.dataset.valor || "";
    wrapper.setOpcoes = (novasOpcoes) => {
        opcoes = novasOpcoes;
        if (valorInicial) {
            const opt = opcoes.find(o => o.valor === valorInicial);
            if (opt) { input.value = opt.label; input.dataset.valor = opt.valor; }
        }
    };

    return wrapper;
}

// ── Converter produtos/infra para formato do componente de busca ──
function opcoesParaProdutos() {
    const resultado = [];
    ordemCategorias.forEach(cat => {
        produtos.filter(p => categoriaProduto(p.codigo) === cat).forEach(p => {
            resultado.push({
                valor: p.codigo,
                label: p.nome,
                sublabel: p.codigo,
                grupo: cat,
                preco: formatarMoeda(p.valor)
            });
        });
    });
    return resultado;
}

function opcoesParaInfra() {
    return itensInfra.map(i => ({
        valor: i.nome,
        label: i.nome,
        sublabel: "",
        grupo: "",
        preco: formatarMoeda(i.valor)
    }));
}

// ── ADICIONAR PRODUTO ──
let contadorProd = 0;

function adicionarProduto(codigo, quantidade) {
    contadorProd++;
    const lista = document.getElementById("listaProdutos");
    const linha = document.createElement("div");
    linha.className = "produto-linha item-produto";

    const numero = document.createElement("div");
    numero.className = "produto-numero";
    numero.textContent = contadorProd;

    const busca = criarBusca(
        opcoesParaProdutos(),
        "Buscar produto...",
        codigo || "",
        () => calcular()
    );

    const qtd = document.createElement("input");
    qtd.type = "number"; qtd.className = "produto-qtd";
    qtd.min = "0"; qtd.value = quantidade || 0;

    const remover = document.createElement("button");
    remover.type = "button"; remover.className = "botao-remover";
    remover.innerHTML = "×";

    qtd.addEventListener("input", calcular);
    remover.addEventListener("click", () => { linha.remove(); renumerarProd(); calcular(); });

    linha.appendChild(numero);
    linha.appendChild(busca);
    linha.appendChild(qtd);
    linha.appendChild(remover);
    lista.appendChild(linha);
    renumerarProd();
    calcular();
}

function renumerarProd() {
    document.querySelectorAll(".item-produto .produto-numero").forEach((n, i) => {
        n.textContent = i + 1;
    });
}

// ── ADICIONAR INFRA ──
function adicionarInfra(nome, quantidade) {
    const lista = document.getElementById("listaInfra");
    const linha = document.createElement("div");
    linha.className = "infra-linha item-infra";

    const busca = criarBusca(
        opcoesParaInfra(),
        "Buscar item de infra...",
        nome || "",
        () => calcular()
    );

    const qtd = document.createElement("input");
    qtd.type = "number"; qtd.className = "produto-qtd";
    qtd.min = "0"; qtd.value = quantidade || 0;

    const remover = document.createElement("button");
    remover.type = "button"; remover.className = "botao-remover";
    remover.innerHTML = "×";

    qtd.addEventListener("input", calcular);
    remover.addEventListener("click", () => { linha.remove(); calcular(); });

    linha.appendChild(busca);
    linha.appendChild(qtd);
    linha.appendChild(remover);
    lista.appendChild(linha);
    calcular();
}

// ── CÁLCULO ──
function calcular() {
    const tipoEl = document.querySelector('input[name="tipo"]:checked');
    const tipo = tipoEl ? tipoEl.value : "analogica";
    const usarSocio = document.getElementById("usarSocio").checked;

    let qtdCameras = 0, totalProdutos = 0;
    document.querySelectorAll(".item-produto").forEach(linha => {
        const busca = linha.querySelector(".busca-wrapper");
        const codigo = busca ? busca.getValor() : "";
        const qtd = Number(linha.querySelector(".produto-qtd").value) || 0;
        if (codigo.startsWith("CAM-")) qtdCameras += qtd;
        totalProdutos += pegarValorProduto(codigo) * qtd;
    });

    let totalInfra = 0;
    document.querySelectorAll(".item-infra").forEach(linha => {
        const busca = linha.querySelector(".busca-wrapper");
        const nome = busca ? busca.getValor() : "";
        const qtd = Number(linha.querySelector(".produto-qtd").value) || 0;
        totalInfra += pegarValorInfra(nome) * qtd;
    });

    document.getElementById("totalCameras").textContent = qtdCameras;
    let nivel = qtdCameras >= 33 ? "dificil" : qtdCameras >= 9 ? "medio" : qtdCameras >= 1 ? "facil" : "";
    document.getElementById("totalCameras").className = "campo-automatico" + (nivel ? " nivel-" + nivel : "");

    const tabelaSolo = {
        analogica: { facil:1.6, medio:1.7, dificil:1.7 },
        ip:        { facil:1.7, medio:1.9, dificil:2.0 },
        wifi:      { facil:2.0, medio:2.1, dificil:2.2 },
        automacao: { facil:2.2, medio:2.4, dificil:2.7 },
        sensores:  { facil:2.0, medio:2.2, dificil:2.3 },
    };
    const tabelaSocio = {
        analogica: { facil:2.1, medio:2.2, dificil:2.2 },
        ip:        { facil:2.3, medio:2.4, dificil:2.6 },
        wifi:      { facil:2.6, medio:2.7, dificil:2.8 },
        automacao: { facil:3.0, medio:3.2, dificil:3.5 },
        sensores:  { facil:2.8, medio:3.0, dificil:3.2 },
    };
    const tabela = usarSocio ? tabelaSocio : tabelaSolo;
    const nivelCalc = nivel || "facil";
    const mult = (tabela[tipo] || tabela.analogica)[nivelCalc];

    const diasTrabalho = Number(document.getElementById("diasTrabalho").value) || 0;
    const diasDiarista = Number(document.getElementById("diasDiarista").value) || 0;
    const deslocamento = 50 * diasTrabalho;
    const diarias      = diasTrabalho * 500 * (usarSocio ? 2 : 1);
    const diarista     = diasDiarista * 120;
    const despesas     = deslocamento + totalInfra + diarias + diarista;
    const valorFinal   = Math.round((totalProdutos * mult + despesas) / 50) * 50;

    document.getElementById("resultado").innerHTML =
        `<span>Valor final do projeto</span>${formatarMoeda(valorFinal)}`;

    document.getElementById("info").innerHTML = `
        <div class="info-resumo">
            <div class="info-linha"><span>Equipamentos</span><strong>${formatarMoeda(totalProdutos)}</strong></div>
            <div class="info-linha"><span>Infraestrutura</span><strong>${formatarMoeda(totalInfra)}</strong></div>
            <div class="info-linha"><span>Serviço e despesas</span><strong>${formatarMoeda(despesas - totalInfra)}</strong></div>
        </div>`;

    salvarEstado();
}

// ── PERSISTÊNCIA ──
function salvarEstado() {
    const estado = {
        tipo: document.querySelector('input[name="tipo"]:checked')?.value || "analogica",
        socio: document.getElementById("usarSocio").checked,
        diasTrabalho: document.getElementById("diasTrabalho").value,
        diasDiarista: document.getElementById("diasDiarista").value,
        produtos: [],
        infra: []
    };
    document.querySelectorAll(".item-produto").forEach(linha => {
        const busca = linha.querySelector(".busca-wrapper");
        estado.produtos.push({
            codigo: busca ? busca.getValor() : "",
            qtd: linha.querySelector(".produto-qtd").value
        });
    });
    document.querySelectorAll(".item-infra").forEach(linha => {
        const busca = linha.querySelector(".busca-wrapper");
        estado.infra.push({
            nome: busca ? busca.getValor() : "",
            qtd: linha.querySelector(".produto-qtd").value
        });
    });
    localStorage.setItem("cpz_estado", JSON.stringify(estado));
}

function restaurarEstado() {
    try {
        const raw = localStorage.getItem("cpz_estado");
        if (!raw) return false;
        const estado = JSON.parse(raw);

        document.querySelectorAll('input[name="tipo"]').forEach(cb => {
            cb.checked = cb.value === estado.tipo;
        });
        document.getElementById("usarSocio").checked = estado.socio || false;
        if (estado.diasTrabalho) document.getElementById("diasTrabalho").value = estado.diasTrabalho;
        if (estado.diasDiarista) document.getElementById("diasDiarista").value = estado.diasDiarista;

        if (estado.produtos && estado.produtos.length > 0) {
            estado.produtos.forEach(p => adicionarProduto(p.codigo, p.qtd));
        } else {
            adicionarProduto();
        }
        if (estado.infra && estado.infra.length > 0) {
            estado.infra.forEach(i => adicionarInfra(i.nome, i.qtd));
        } else {
            adicionarInfra();
        }
        return true;
    } catch(e) {
        console.error("Erro ao restaurar:", e);
        return false;
    }
}

function limparOrcamento() {
    if (!confirm("Apagar o orçamento atual e começar do zero?")) return;
    localStorage.removeItem("cpz_estado");
    document.getElementById("listaProdutos").innerHTML = "";
    document.getElementById("listaInfra").innerHTML = "";
    document.querySelectorAll('input[name="tipo"]').forEach((cb, i) => cb.checked = i === 0);
    document.getElementById("usarSocio").checked = false;
    document.getElementById("diasTrabalho").value = 1;
    document.getElementById("diasDiarista").value = 1;
    adicionarProduto();
    adicionarInfra();
    calcular();
}

function abrirPagamentos() {
    alert("Próxima etapa: formas de pagamento.");
}

// ── EVENTOS ──
document.querySelectorAll('input[name="tipo"]').forEach(cb => {
    cb.addEventListener("click", function() {
        document.querySelectorAll('input[name="tipo"]').forEach(o => o.checked = false);
        this.checked = true;
        calcular();
    });
});
document.querySelectorAll('input[type="number"]').forEach(c => c.addEventListener("input", calcular));
document.getElementById("usarSocio").addEventListener("change", calcular);

// ── INIT ──
async function init() {
    await carregarBanco();
    const restaurado = restaurarEstado();
    if (!restaurado) {
        adicionarProduto();
        adicionarInfra();
    }
    calcular();
}

init();

</script>

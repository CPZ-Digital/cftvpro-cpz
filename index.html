<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPZ Orçamento Inteligente</title>
<style>

/* ============================================================
   CONFIGURAÇÃO DA FONTE DO GOOGLE SHEETS
   Para trocar a fonte do banco de dados, edite a URL abaixo
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

:root {
    --bg:        #0f1115;
    --surface:   #181b20;
    --border:    #272b33;
    --border2:   #2f3540;
    --blue:      #0A84FF;
    --blue-dim:  #17324f;
    --text:      #ffffff;
    --muted:     #8f98a8;
    --label:     #c7ced8;
    --item-bg:   #23272f;
    --ok:        #14532d;
    --warn:      #854d0e;
    --danger:    #7f1d1d;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', Arial, sans-serif;
    padding: 16px;
}

.container {
    max-width: 480px;
    margin: auto;
    background: var(--surface);
    padding: 18px;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 18px 45px rgba(0,0,0,0.35);
}

/* ── TOPO ── */
.topo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
}
.topo h2 { margin: 2px 0 0; font-size: 25px; }
.subtitulo { margin: 0; color: var(--muted); font-size: 13px; }
.logo-empresa {
    width: 190px; max-width: 52%; height: auto;
    border-radius: 8px; background: #fff;
    padding: 5px;
    box-shadow: 0 8px 18px rgba(10,132,255,0.22);
}


/* ── LABELS E SEÇÕES ── */
.container > label,
.linha-dupla label,
.secao-titulo {
    display: block;
    color: var(--label);
    font-size: 13px;
    font-weight: bold;
    margin-top: 16px;
    margin-bottom: 8px;
}

/* ── INPUTS ── */
input[type="number"], select {
    width: 100%;
    min-height: 44px;
    padding: 11px 12px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    font-family: 'DM Sans', Arial, sans-serif;
}
input[type="number"]:focus, select:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(10,132,255,0.2);
}
select { background: #f4f7fb; color: #12151a; min-width: 0; }

/* ── TIPO DO PROJETO ── */
.opcoes-projeto {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 10px;
}
.opcao-projeto {
    display: flex; align-items: center; gap: 10px;
    min-height: 46px;
    background: var(--item-bg);
    border: 1px solid var(--border2);
    padding: 12px; border-radius: 8px;
    cursor: pointer; font-weight: bold;
}
.opcao-projeto input {
    width: 18px; height: 18px; margin: 0;
    accent-color: var(--blue);
}
.opcao-projeto:has(input:checked) {
    outline: 2px solid var(--blue);
    border-color: var(--blue);
    background: var(--blue-dim);
}

/* ── APOIO TÉCNICO ── */
.opcao-checkbox {
    display: flex; align-items: center; gap: 10px;
    margin-top: 12px;
    background: var(--item-bg);
    padding: 12px; border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--border2);
}
.opcao-checkbox input {
    width: 18px; height: 18px;
    accent-color: var(--blue);
}
.opcao-checkbox:has(input:checked) {
    border-color: var(--blue);
    background: var(--blue-dim);
}

/* ── SEÇÃO ── */
.secao {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid #2b3038;
}
.secao-titulo { margin-top: 0; }

/* ── PRODUTOS ── */
.produtos-grid { display: grid; gap: 10px; }
.produto-linha {
    display: grid;
    grid-template-columns: 34px minmax(0,1fr) 72px 36px;
    gap: 10px; align-items: center;
}
.produtos-cabecalho { color: #aaa; font-size: 13px; }
.produto-linha label { color: #ddd; }
.produto-numero {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px;
    background: #2b3038; border-radius: 8px;
    color: #ddd; font-weight: bold;
}
.produto-qtd { text-align: center; }
.botao-remover {
    width: 36px; height: 36px; min-height: 36px;
    margin: 0; padding: 0;
    background: #2b3038; color: #cfd6e3;
    font-size: 20px; line-height: 1;
}
.botao-remover:hover { background: #7f1d1d; color: white; }

/* ── TOTAL CÂMERAS ── */
.linha-total-cameras {
    display: flex; align-items: center;
    justify-content: space-between;
    gap: 14px; margin-top: 14px;
    padding: 10px 12px;
    background: var(--item-bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
}
.linha-total-cameras span:first-child {
    color: var(--label); font-size: 13px; font-weight: bold;
}
.campo-automatico {
    display: flex; align-items: center; justify-content: center;
    min-width: 58px; height: 40px;
    background: #2a2a2a; color: white;
    font-weight: bold; border-radius: 8px; font-size: 18px;
}
.campo-automatico.nivel-facil   { background: var(--ok); }
.campo-automatico.nivel-medio   { background: var(--warn); }
.campo-automatico.nivel-dificil { background: var(--danger); }

/* ── LINHA DUPLA ── */
.linha-dupla {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-top: 6px;
}

/* ── BOTÕES ── */
button {
    width: 100%; min-height: 44px;
    padding: 12px; margin-top: 16px;
    border: none; border-radius: 8px;
    background: var(--blue); color: white;
    font-size: 16px; font-weight: bold;
    cursor: pointer;
    font-family: 'DM Sans', Arial, sans-serif;
}
button:hover { filter: brightness(1.08); }
.botao-adicionar { margin-top: 12px; background: #16803a; }

/* ── RESULTADO ── */
.resultado {
    margin-top: 18px;
    background: var(--blue); color: white;
    padding: 18px; border-radius: 10px;
    font-size: 30px; font-weight: bold; line-height: 1.1;
    box-shadow: 0 12px 24px rgba(10,132,255,0.25);
}
.resultado span {
    display: block; margin-bottom: 6px;
    color: #dceeff; font-size: 13px; font-weight: bold;

.info { margin-top: 12px; color: #aaa; line-height: 1.5; }
.info-resumo { display: grid; gap: 6px; margin-top: 14px; color: #cfcfcf; font-size: 14px; }
.info-linha {
    display: flex; justify-content: space-between; gap: 12px;
    border-bottom: 1px solid #2f2f2f; padding-bottom: 6px;
}
.info-linha:last-child { border-bottom: none; padding-bottom: 0; }
.botao-pagamento { background: #f4f7fb; color: #151922; margin-top: 12px; }

/* ── RESPONSIVE ── */
@media (max-width: 420px) {
    body { padding: 10px; }

    .produto-linha { grid-template-columns: 32px minmax(0,1fr) 62px 32px; gap: 8px; }
    .opcoes-projeto { gap: 8px; }
}

/* ============================================================
   UTILITÁRIOS
   ============================================================ */

function formatarMoeda(valor) {
    return valor.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

function simplificarNome(nome) {
    return nome.trim().replace(/\s+/g, " ")
        .replace(/CAMERA/gi, "Câmera")
        .replace(/VÍDEO/gi, "vídeo")
        .replace(/ANALÓGICA/gi, "analógica")
        .replace(/ANALOGICA/gi, "analógica")
        .replace(/BRANCA/gi, "branca")
        .replace(/PRETA/gi, "preta")
        .replace(/CAIXA DE PASSAGEM/gi, "caixa de passagem")
        .replace(/CONVERSOR AUTOMATICO/gi, "Conversor automático")
        .replace(/PROTETOR ELETRONICO/gi, "Protetor eletrônico")
        .replace(/SWITCH NAO GERENCIAVEL/gi, "Switch não gerenciável")
        .replace(/INTERRUPTOR/gi, "Interruptor")
        .replace(/CARTAO/gi, "Cartão")
        .replace(/CABO/gi, "Cabo")
        .replace(/MINI RACK/gi, "Mini rack")
        .replace(/NOBREAK/gi, "Nobreak")
        .replace(/CANAIS/gi, "canais")
        .replace(/PORTAS/gi, "portas")
        .replace(/TOMADAS/gi, "tomadas")
        .replace(/PACOTE COM/gi, "pacote com")
        .replace(/UNIDADES/gi, "unidades")
        .replace(/BORNE DE PARAFUSO/gi, "borne de parafuso")
        .replace(/ALIMENTACAO/gi, "alimentação")
        .replace(/ALIMENTAÇÃO/gi, "alimentação")
        .replace(/p\/SEGURANCA ELETRONICA/gi, "para segurança eletrônica")
        .replace(/SEGURANCA ELETRONICA/gi, "segurança eletrônica")
        .replace(/P\/RACK/gi, "para rack")
        .replace(/S\/FIO/gi, "sem fio")
        .replace(/s\/HD/g, "sem HD")
        .replace(/c\/HD/g, "com HD")
        .replace(/c\/MICROSD/gi, "com MicroSD")
        .replace(/\s*-\s*/g, " - ");
}

/* ============================================================
   BANCO DE DADOS — estado global

let produtos = [];   // [{codigo, nome, valor}]

    "Infraestrutura", "Rede", "Energia", "Automação", "Acessórios"
];

function categoriaProduto(codigo) {
    if (codigo.startsWith("CAM-"))                           return "Câmeras";
    if (codigo.startsWith("DVR") || codigo.startsWith("NVR")) return "Gravadores";
    if (codigo.startsWith("ARM-"))                           return "Armazenamento";
    if (codigo.startsWith("CAB-"))                           return "Cabos";
    if (codigo.startsWith("INF-"))                           return "Infraestrutura";
    if (codigo.startsWith("SW")  || codigo.startsWith("RED-")) return "Rede";
    if (codigo.startsWith("ENG-"))                           return "Energia";
    if (codigo.startsWith("AUT-"))                           return "Automação";
    return "Acessórios";
}

function pegarValorProduto(codigo) {
    const p = produtos.find(i => i.codigo === codigo);
    return p ? p.valor : 0;
}

/* ============================================================
   PARSER CSV
   Suporta vírgulas dentro de aspas, separador ; ou ,
   ============================================================ */

function parseCsv(texto) {
    const linhas = texto.trim().split(/\r?\n/);
    if (linhas.length < 2) return [];

    // Detectar separador pela primeira linha
    const sep = linhas[0].includes(";") ? ";" : ",";

    // Pular cabeçalho
    const resultado = [];
    for (let i = 1; i < linhas.length; i++) {
        const linha = linhas[i].trim();
        if (!linha) continue;

        // Separar campos respeitando aspas
        const campos = [];
        let atual = "";
        let dentroAspas = false;
        for (let c = 0; c < linha.length; c++) {
            if (linha[c] === '"') {
                dentroAspas = !dentroAspas;
            } else if (linha[c] === sep && !dentroAspas) {
                campos.push(atual.trim());
                atual = "";
            } else {
                atual += linha[c];
            }
        }
        campos.push(atual.trim());

        if (campos.length < 3) continue;

        const codigo = campos[0].replace(/^"|"$/g, "").trim();
        const nome   = campos[1].replace(/^"|"$/g, "").trim();
        const valor  = parseFloat(campos[2].replace(/^"|"$/g, "").replace(",", ".").trim());

        if (!codigo || !nome || isNaN(valor)) continue;

        resultado.push({
            codigo,
            nome: simplificarNome(nome),
            valor
        });
    }
    return resultado;
}

function carregarProdutos(lista) {

        preencherSelectProduto(sel, valorAtual);
    });

}

/* ============================================================
   CARREGAR DO GOOGLE SHEETS
   ============================================================ */

async function carregarDoSheets() {
    const url = document.getElementById("inputUrl") 
        ? document.getElementById("inputUrl").value.trim() 
        : "";
    const urlFinal = url || "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg5zxUiq6B03q8unGatN0ATJz1aLR89j34Xe3Z0-a8DFQyh3k-HpZsMngRxVTyrK9quopeBKCHTGlw/pub?gid=1778121456&single=true&output=csv";

    setDbStatus("", "Carregando do Google Sheets...");

    try {
        const resp = await fetch(urlFinal);
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const texto = await resp.text();
        const lista = parseCsv(texto);

        if (lista.length === 0) {
            throw new Error("Nenhum produto encontrado. Verifique o formato da planilha.");
        }

        // Salvar URL para uso futuro
        localStorage.setItem("cpz_sheets_url", url);

        carregarProdutos(lista);
        setDbStatus("ok", `<strong>Google Sheets</strong> — ${lista.length} produtos carregados`);
        
    } catch (e) {
        setDbStatus("erro", "Erro ao carregar: " + e.message);
    }
}

/* ============================================================
   IMPORTAR CSV LOCAL
   ============================================================ */

function importarCsvLocal(event) {
    const arquivo = event.target.files[0];
    if (!arquivo) return;

    setDbStatus("", "Lendo arquivo CSV...");

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const lista = parseCsv(e.target.result);
            if (lista.length === 0) throw new Error("Nenhum produto encontrado.");

            carregarProdutos(lista);
            setDbStatus("local", `<strong>${arquivo.name}</strong> — ${lista.length} produtos carregados`);
                    } catch(err) {
            setDbStatus("erro", "Erro no arquivo: " + err.message);
        }
    };
    reader.readAsText(arquivo, "UTF-8");
}

/* ============================================================
   SELECTS DE PRODUTO
   ============================================================ */

function preencherSelectProduto(sel, valorSelecionado) {
    sel.innerHTML = "";
    sel.add(new Option("Selecione um produto", ""));

    ordemCategorias.forEach(cat => {
        const grupo = produtos.filter(p => categoriaProduto(p.codigo) === cat);
        if (grupo.length === 0) return;

        const optgroup = document.createElement("optgroup");
        optgroup.label = cat;

        grupo.forEach(p => {
            const texto = `${p.codigo} - ${p.nome} - ${formatarMoeda(p.valor)}`;
            const opt = new Option(texto, p.codigo);
            opt.dataset.completo = texto;
            opt.dataset.nome = p.nome;
            optgroup.appendChild(opt);
        });

        sel.appendChild(optgroup);
    });

    sel.value = valorSelecionado || "";
    esconderCodigoProdutoSelecionado(sel);
}

function mostrarProdutosComCodigo(sel) {
    Array.from(sel.options).forEach(opt => {
        if (opt.dataset.completo) opt.textContent = opt.dataset.completo;
    });
}

function esconderCodigoProdutoSelecionado(sel) {
    const opt = sel.options[sel.selectedIndex];
    if (opt && opt.dataset.nome) opt.textContent = opt.dataset.nome;
}

/* ============================================================
   ADICIONAR / REMOVER PRODUTOS
   ============================================================ */

let contadorProdutos = 0;

function adicionarProduto(codigo, quantidade) {
    if (produtos.length === 0) {
        alert("Carregue o banco de dados primeiro.");
        return;
    }

    contadorProdutos++;
    const lista = document.getElementById("listaProdutos");
    const linha = document.createElement("div");
    linha.className = "produto-linha item-produto";

    const numero = document.createElement("div");
    numero.className = "produto-numero";
    numero.textContent = contadorProdutos;

    const sel = document.createElement("select");
    sel.className = "produto-select";
    preencherSelectProduto(sel, codigo);

    const qtd = document.createElement("input");
    qtd.type = "number";
    qtd.className = "produto-qtd";
    qtd.min = "0";
    qtd.value = quantidade || 0;

    const remover = document.createElement("button");
    remover.type = "button";
    remover.className = "botao-remover";
    remover.innerHTML = "×";
    remover.title = "Remover item";

    sel.addEventListener("focus",    () => mostrarProdutosComCodigo(sel));
    sel.addEventListener("mousedown", () => mostrarProdutosComCodigo(sel));
    sel.addEventListener("keydown",   () => mostrarProdutosComCodigo(sel));
    sel.addEventListener("change",    () => { calcular(); setTimeout(() => esconderCodigoProdutoSelecionado(sel), 80); });
    sel.addEventListener("blur",      () => esconderCodigoProdutoSelecionado(sel));
    qtd.addEventListener("input", calcular);
    remover.addEventListener("click", () => { linha.remove(); renumerarProdutos(); calcular(); });

    linha.appendChild(numero);
    linha.appendChild(sel);
    linha.appendChild(qtd);
    linha.appendChild(remover);
    lista.appendChild(linha);

    renumerarProdutos();
    calcular();
}

function renumerarProdutos() {
    document.querySelectorAll(".item-produto .produto-numero").forEach((n, i) => {
        n.textContent = i + 1;
    });
}

/* ============================================================
   CÁLCULO
   ============================================================ */

function calcular() {
    const tipoEl = document.querySelector('input[name="tipo"]:checked');
    const tipo = tipoEl ? tipoEl.value : "analogica";

    let qtdCameras = 0;
    let totalProdutos = 0;

    document.querySelectorAll(".item-produto").forEach(linha => {
        const sel = linha.querySelector(".produto-select");
        const qtd = Number(linha.querySelector(".produto-qtd").value) || 0;
        if (sel.value.startsWith("CAM-")) qtdCameras += qtd;
        totalProdutos += pegarValorProduto(sel.value) * qtd;
    });

    document.getElementById("totalCameras").textContent = qtdCameras;

    // Nível
    let nivel = "facil";
    if (qtdCameras >= 5 && qtdCameras <= 8) nivel = "medio";
    if (qtdCameras >= 9) nivel = "dificil";
    document.getElementById("totalCameras").className = "campo-automatico nivel-" + nivel;

    // Multiplicadores
    const tabela = {
        analogica: { facil: 1.6, medio: 1.7, dificil: 1.7 },
        ip:        { facil: 1.7, medio: 1.9, dificil: 2.0 },
        wifi:      { facil: 2.0, medio: 2.1, dificil: 2.2 },
        automacao: { facil: 2.2, medio: 2.4, dificil: 2.7 },
        sensores:  { facil: 2.0, medio: 2.2, dificil: 2.3 },
    };
    const multiplicador = (tabela[tipo] || tabela.analogica)[nivel];

    const infra        = Number(document.getElementById("infra").value) || 0;
    const diasTrabalho = Number(document.getElementById("diasTrabalho").value) || 0;
    const diasDiarista = Number(document.getElementById("diasDiarista").value) || 0;
    const usarSocio    = document.getElementById("usarSocio").checked;

    const custoDeslocamento = 50 * diasTrabalho;
    const totalDiarias      = diasTrabalho * 500 * (usarSocio ? 2 : 1);
    const totalDiarista     = diasDiarista * 120;
    const despesas          = custoDeslocamento + infra + totalDiarias + totalDiarista;

    const valorFinal = Math.round(
        (totalProdutos * multiplicador + despesas) / 50
    ) * 50;

    document.getElementById("resultado").innerHTML =
        `<span>Valor final do projeto</span>${formatarMoeda(valorFinal)}`;

    document.getElementById("info").innerHTML = `
        <div class="info-resumo">
            <div class="info-linha">
                <span>Equipamentos</span>
                <strong>${formatarMoeda(totalProdutos)}</strong>
            </div>
            <div class="info-linha">
                <span>Serviço e despesas</span>
                <strong>${formatarMoeda(despesas)}</strong>
            </div>
        </div>`;
}

function abrirPagamentos() {
    alert("Próxima etapa: formas de pagamento.");
}

/* ============================================================
   EVENTOS GLOBAIS
   ============================================================ */

// Checkboxes de tipo funcionam como radio
document.querySelectorAll('input[name="tipo"]').forEach(cb => {
    cb.addEventListener("change", function() {
        document.querySelectorAll('input[name="tipo"]').forEach(o => o.checked = false);
        this.checked = true;
        calcular();
    });
});

document.querySelectorAll('input[type="number"]').forEach(c => c.addEventListener("input", calcular));
document.getElementById("usarSocio").addEventListener("change", calcular);

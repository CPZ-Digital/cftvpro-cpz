<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPZ Orçamento Inteligente</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

:root {
    --bg:        #0f1115;
    --surface:   #181b20;
    --border:    #272b33;
    --border2:   #2f3540;
    --blue:      #0A84FF;
    --blue-dim:  #17324f;
    --text:      #ffffff;
    --muted:     #8f98a8;
    --label:     #c7ced8;
    --item-bg:   #23272f;
    --ok:        #14532d;
    --warn:      #854d0e;
    --danger:    #7f1d1d;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', Arial, sans-serif;
    padding: 16px;
}

.container {
    max-width: 480px;
    margin: auto;
    background: var(--surface);
    padding: 18px;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 18px 45px rgba(0,0,0,0.35);
}

.topo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
}
.topo h2 { margin: 2px 0 0; font-size: 25px; }
.subtitulo { margin: 0; color: var(--muted); font-size: 13px; }
.logo-empresa {
    width: 190px; max-width: 52%; height: auto;
    border-radius: 8px; background: #fff;
    padding: 5px;
    box-shadow: 0 8px 18px rgba(10,132,255,0.22);
}

.container > label,
.linha-dupla label,
.secao-titulo {
    display: block;
    color: var(--label);
    font-size: 13px;
    font-weight: bold;
    margin-top: 16px;
    margin-bottom: 8px;
}

input[type="number"], select {
    width: 100%;
    min-height: 44px;
    padding: 11px 12px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    font-family: 'DM Sans', Arial, sans-serif;
}
input[type="number"]:focus, select:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(10,132,255,0.2);
}
select { background: #f4f7fb; color: #12151a; min-width: 0; }

.opcoes-projeto {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 10px;
}
.opcao-projeto {
    display: flex; align-items: center; gap: 10px;
    min-height: 46px;
    background: var(--item-bg);
    border: 1px solid var(--border2);
    padding: 12px; border-radius: 8px;
    cursor: pointer; font-weight: bold;
}
.opcao-projeto input {
    width: 18px; height: 18px; margin: 0;
    accent-color: var(--blue);
}
.opcao-projeto:has(input:checked) {
    outline: 2px solid var(--blue);
    border-color: var(--blue);
    background: var(--blue-dim);
}

.secao {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid #2b3038;
}
.secao-titulo { margin-top: 0; }

.produtos-grid { display: grid; gap: 10px; }

/* grade com 3 colunas para infraestrutura (sem número) */
.produto-linha {
    display: grid;
    grid-template-columns: 34px minmax(0,1fr) 72px 36px;
    gap: 10px; align-items: center;
}
.infra-linha {
    display: grid;
    grid-template-columns: minmax(0,1fr) 72px 36px;
    gap: 10px; align-items: center;
}
.produtos-cabecalho { color: #aaa; font-size: 13px; }
.produto-numero {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px;
    background: #2b3038; border-radius: 8px;
    color: #ddd; font-weight: bold;
}
.produto-qtd { text-align: center; }
.botao-remover {
    width: 36px; height: 36px; min-height: 36px;
    margin: 0; padding: 0;
    background: #2b3038; color: #cfd6e3;
    font-size: 20px; line-height: 1;
}
.botao-remover:hover { background: #7f1d1d; color: white; }

.linha-total-cameras {
    display: flex; align-items: center;
    justify-content: space-between;
    gap: 14px; margin-top: 14px;
    padding: 10px 12px;
    background: var(--item-bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
}
.linha-total-cameras span:first-child {
    color: var(--label); font-size: 13px; font-weight: bold;
}
.campo-automatico {
    display: flex; align-items: center; justify-content: center;
    min-width: 58px; height: 40px;
    background: #2a2a2a; color: white;
    font-weight: bold; border-radius: 8px; font-size: 18px;
}
.campo-automatico.nivel-facil   { background: var(--ok); }
.campo-automatico.nivel-medio   { background: var(--warn); }
.campo-automatico.nivel-dificil { background: var(--danger); }

.linha-dupla {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-top: 6px;
}

button {
    width: 100%; min-height: 44px;
    padding: 12px; margin-top: 16px;
    border: none; border-radius: 8px;
    background: var(--blue); color: white;
    font-size: 16px; font-weight: bold;
    cursor: pointer;
    font-family: 'DM Sans', Arial, sans-serif;
}
button:hover { filter: brightness(1.08); }
.botao-adicionar { margin-top: 12px; background: #16803a; }

.resultado {
    margin-top: 18px;
    background: var(--blue); color: white;
    padding: 18px; border-radius: 10px;
    font-size: 30px; font-weight: bold; line-height: 1.1;
    box-shadow: 0 12px 24px rgba(10,132,255,0.25);
}
.resultado span {
    display: block; margin-bottom: 6px;
    color: #dceeff; font-size: 13px; font-weight: bold;
}
.info { margin-top: 12px; color: #aaa; line-height: 1.5; }
.info-resumo { display: grid; gap: 6px; margin-top: 14px; color: #cfcfcf; font-size: 14px; }
.info-linha {
    display: flex; justify-content: space-between; gap: 12px;
    border-bottom: 1px solid #2f2f2f; padding-bottom: 6px;
}
.info-linha:last-child { border-bottom: none; padding-bottom: 0; }
.botao-pagamento { background: #f4f7fb; color: #151922; margin-top: 12px; }

@media (max-width: 420px) {
    body { padding: 10px; }
    .container { padding: 14px; }
    .produto-linha { grid-template-columns: 32px minmax(0,1fr) 62px 32px; gap: 8px; }
    .infra-linha   { grid-template-columns: minmax(0,1fr) 62px 32px; gap: 8px; }
    .opcoes-projeto { gap: 8px; }
}

</style>
</head>
<body>

<div class="container">

    <div class="topo">
        <div>
            <h2>Orçamento rápido</h2>
            <p class="subtitulo">CPZ Digital</p>
        </div>
        <img class="logo-empresa" src="cpz-logo.png" alt="CPZ Digital">
    </div>

    <label>Tipo do Projeto</label>
    <div class="opcoes-projeto">
        <label class="opcao-projeto">
            <input type="checkbox" name="tipo" value="analogica" checked> Analógica
        </label>
        <label class="opcao-projeto">
            <input type="checkbox" name="tipo" value="ip"> IP
        </label>
        <label class="opcao-projeto">
            <input type="checkbox" name="tipo" value="wifi"> Wi-Fi
        </label>
        <label class="opcao-projeto">
            <input type="checkbox" name="tipo" value="automacao"> Automação
        </label>
        <label class="opcao-projeto">
            <input type="checkbox" name="tipo" value="sensores"> Sensores
        </label>
        <label class="opcao-projeto">
            <input type="checkbox" id="usarSocio"> Apoio técnico
        </label>
    </div>

    <div class="linha-total-cameras">
        <span>Total de câmeras</span>
        <span id="totalCameras" class="campo-automatico">0</span>
    </div>

    <!-- PRODUTOS -->
    <div class="secao">
        <label class="secao-titulo">Itens do projeto</label>

        <div class="produto-linha produtos-cabecalho">
            <span>Nº</span>
            <span>Produto</span>
            <span>Qtd.</span>
            <span></span>
        </div>

        <div class="produtos-grid" id="listaProdutos"></div>

        <button type="button" class="botao-adicionar" onclick="adicionarProduto()">
            + Adicionar item
        </button>
    </div>

    <!-- INFRAESTRUTURA -->
    <div class="secao">
        <label class="secao-titulo">Infraestrutura</label>

        <div class="infra-linha produtos-cabecalho">
            <span>Item</span>
            <span>Qtd.</span>
            <span></span>
        </div>

        <div class="produtos-grid" id="listaInfra"></div>

        <button type="button" class="botao-adicionar" onclick="adicionarInfra()">
            + Adicionar item
        </button>
    </div>

    <div class="linha-dupla">
        <div>
            <label>Dias de trabalho</label>
            <input type="number" id="diasTrabalho" min="0" value="1">
        </div>
        <div>
            <label>Dias com diarista</label>
            <input type="number" id="diasDiarista" min="0" value="1">
        </div>
    </div>

    <div class="resultado" id="resultado">
        <span>Valor final do projeto</span>
        R$ 0,00
    </div>

    <div class="info" id="info"></div>

    <button type="button" class="botao-pagamento" onclick="abrirPagamentos()">
        Ver formas de pagamento
    </button>

</div>

<script>

// ============================================================
// URLS DAS ABAS DA PLANILHA
// Produtos:       aba principal (gid=1778121456)
// Infraestrutura: troque pelo gid da sua nova aba
// ============================================================
const URL_PRODUTOS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg5zxUiq6B03q8unGatN0ATJz1aLR89j34Xe3Z0-a8DFQyh3k-HpZsMngRxVTyrK9quopeBKCHTGlw/pub?gid=1778121456&single=true&output=csv";
const URL_INFRA    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg5zxUiq6B03q8unGatN0ATJz1aLR89j34Xe3Z0-a8DFQyh3k-HpZsMngRxVTyrK9quopeBKCHTGlw/pub?gid=1725487429&single=true&output=csv";

let produtos = [];
let itensInfra = [];  // [{nome, valor}]

const ordemCategorias = [
    "Câmeras","Gravadores","Armazenamento","Cabos",
    "Infraestrutura","Rede","Energia","Automação","Acessórios"
];

function formatarMoeda(valor) {
    return valor.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

function simplificarNome(nome) {
    return nome.trim().replace(/\s+/g, " ")
        .replace(/CAMERA/gi, "Câmera")
        .replace(/ANALOGICA/gi, "analógica")
        .replace(/BRANCA/gi, "branca")
        .replace(/PRETA/gi, "preta")
        .replace(/CAIXA DE PASSAGEM/gi, "caixa de passagem")
        .replace(/CONVERSOR AUTOMATICO/gi, "Conversor automático")
        .replace(/PROTETOR ELETRONICO/gi, "Protetor eletrônico")
        .replace(/SWITCH NAO GERENCIAVEL/gi, "Switch não gerenciável")
        .replace(/INTERRUPTOR/gi, "Interruptor")
        .replace(/CARTAO/gi, "Cartão")
        .replace(/CABO/gi, "Cabo")
        .replace(/MINI RACK/gi, "Mini rack")
        .replace(/NOBREAK/gi, "Nobreak")
        .replace(/CANAIS/gi, "canais")
        .replace(/PORTAS/gi, "portas")
        .replace(/TOMADAS/gi, "tomadas")
        .replace(/PACOTE COM/gi, "pacote com")
        .replace(/UNIDADES/gi, "unidades")
        .replace(/BORNE DE PARAFUSO/gi, "borne de parafuso")
        .replace(/ALIMENTACAO/gi, "alimentação")
        .replace(/ALIMENTAÇÃO/gi, "alimentação")
        .replace(/p\/SEGURANCA ELETRONICA/gi, "para segurança eletrônica")
        .replace(/SEGURANCA ELETRONICA/gi, "segurança eletrônica")
        .replace(/P\/RACK/gi, "para rack")
        .replace(/S\/FIO/gi, "sem fio")
        .replace(/s\/HD/g, "sem HD")
        .replace(/c\/HD/g, "com HD")
        .replace(/c\/MICROSD/gi, "com MicroSD")
        .replace(/\s*-\s*/g, " - ");
}

function categoriaProduto(codigo) {
    if (codigo.startsWith("CAM-"))                              return "Câmeras";
    if (codigo.startsWith("DVR") || codigo.startsWith("NVR"))  return "Gravadores";
    if (codigo.startsWith("ARM-"))                             return "Armazenamento";
    if (codigo.startsWith("CAB-"))                             return "Cabos";
    if (codigo.startsWith("INF-"))                             return "Infraestrutura";
    if (codigo.startsWith("SW")  || codigo.startsWith("RED-")) return "Rede";
    if (codigo.startsWith("ENG-"))                             return "Energia";
    if (codigo.startsWith("AUT-"))                             return "Automação";
    return "Acessórios";
}

function pegarValorProduto(codigo) {
    const p = produtos.find(i => i.codigo === codigo);
    return p ? p.valor : 0;
}

function pegarValorInfra(nome) {
    const p = itensInfra.find(i => i.nome === nome);
    return p ? p.valor : 0;
}

// ── PARSER CSV ──
function parseCsv(texto, temCodigo) {
    const linhas = texto.trim().split(/\r?\n/);
    if (linhas.length < 2) return [];
    const sep = linhas[0].includes(";") ? ";" : ",";
    const resultado = [];
    for (let i = 1; i < linhas.length; i++) {
        const linha = linhas[i].trim();
        if (!linha) continue;
        const campos = [];
        let atual = "", dentroAspas = false;
        for (let c = 0; c < linha.length; c++) {
            if (linha[c] === '"') { dentroAspas = !dentroAspas; }
            else if (linha[c] === sep && !dentroAspas) { campos.push(atual.trim()); atual = ""; }
            else { atual += linha[c]; }
        }
        campos.push(atual.trim());

        if (temCodigo) {
            if (campos.length < 3) continue;
            const codigo = campos[0].replace(/^"|"$/g, "").trim();
            const nome   = campos[1].replace(/^"|"$/g, "").trim();
            const valor  = parseFloat(campos[2].replace(/^"|"$/g, "").replace(",", ".").trim());
            if (!codigo || !nome || isNaN(valor)) continue;
            resultado.push({ codigo, nome: simplificarNome(nome), valor });
        } else {
            // Infra: col A=codigo, B=descricao, C=qtd, D=preco, E=preco_unit, F=link
            if (campos.length < 5) continue;
            const nome  = campos[1].replace(/^"|"$/g, "").trim(); // coluna B
            const valor = parseFloat(campos[4].replace(/^"|"$/g, "").replace(",", ".").replace(/[^\d.]/g, "").trim()); // coluna E
            if (!nome || isNaN(valor)) continue;
            resultado.push({ nome: simplificarNome(nome), valor });
        }
    }
    return resultado;
}

// ── CARREGAR BANCO ──
async function carregarBanco() {
    // Carrega produtos
    try {
        const rProd = await fetch(URL_PRODUTOS);
        if (rProd.ok) {
            const lista = parseCsv(await rProd.text(), true);
            if (lista.length > 0) {
                produtos = lista;
                document.querySelectorAll(".produto-select").forEach(sel => {
                    preencherSelectProduto(sel, sel.value);
                });
            }
        }
    } catch(e) {
        console.error("Erro ao carregar produtos:", e.message);
    }

    // Carrega infra (só tenta se a URL foi configurada)
    if (!URL_INFRA.includes("SUBSTITUA")) {
        try {
            const rInfra = await fetch(URL_INFRA);
            if (rInfra.ok) {
                const lista = parseCsv(await rInfra.text(), false);
                if (lista.length > 0) {
                    itensInfra = lista;
                    document.querySelectorAll(".infra-select").forEach(sel => {
                        preencherSelectInfra(sel, sel.value);
                    });
                }
            }
        } catch(e) {
            console.error("Erro ao carregar infra:", e.message);
        }
    }

    calcular();
}

// ── SELECTS DE PRODUTO ──
function preencherSelectProduto(sel, valorSelecionado) {
    sel.innerHTML = "";
    sel.add(new Option("Selecione um produto", ""));
    ordemCategorias.forEach(cat => {
        const grupo = produtos.filter(p => categoriaProduto(p.codigo) === cat);
        if (grupo.length === 0) return;
        const optgroup = document.createElement("optgroup");
        optgroup.label = cat;
        grupo.forEach(p => {
            const texto = `${p.codigo} - ${p.nome} - ${formatarMoeda(p.valor)}`;
            const opt = new Option(texto, p.codigo);
            opt.dataset.completo = texto;
            opt.dataset.nome = p.nome;
            optgroup.appendChild(opt);
        });
        sel.appendChild(optgroup);
    });
    sel.value = valorSelecionado || "";
    esconderCodigo(sel);
}

function mostrarCodigo(sel) {
    Array.from(sel.options).forEach(opt => {
        if (opt.dataset.completo) opt.textContent = opt.dataset.completo;
    });
}

function esconderCodigo(sel) {
    const opt = sel.options[sel.selectedIndex];
    if (opt && opt.dataset.nome) opt.textContent = opt.dataset.nome;
}

// ── SELECTS DE INFRA ──
function preencherSelectInfra(sel, valorSelecionado) {
    sel.innerHTML = "";
    sel.add(new Option("Selecione um item", ""));
    itensInfra.forEach(item => {
        const texto = `${item.nome} - ${formatarMoeda(item.valor)}`;
        const opt = new Option(texto, item.nome);
        opt.dataset.completo = texto;
        opt.dataset.nome = item.nome;
        sel.appendChild(opt);
    });
    sel.value = valorSelecionado || "";
    esconderCodigo(sel);
}

// ── ADICIONAR PRODUTO ──
let contadorProd = 0;

function adicionarProduto(codigo, quantidade) {
    contadorProd++;
    const lista = document.getElementById("listaProdutos");
    const linha = document.createElement("div");
    linha.className = "produto-linha item-produto";

    const numero = document.createElement("div");
    numero.className = "produto-numero";
    numero.textContent = contadorProd;

    const sel = document.createElement("select");
    sel.className = "produto-select";
    preencherSelectProduto(sel, codigo);

    const qtd = document.createElement("input");
    qtd.type = "number"; qtd.className = "produto-qtd";
    qtd.min = "0"; qtd.value = quantidade || 0;

    const remover = document.createElement("button");
    remover.type = "button"; remover.className = "botao-remover";
    remover.innerHTML = "×";

    sel.addEventListener("focus",     () => mostrarCodigo(sel));
    sel.addEventListener("mousedown", () => mostrarCodigo(sel));
    sel.addEventListener("keydown",   () => mostrarCodigo(sel));
    sel.addEventListener("change",    () => { calcular(); setTimeout(() => esconderCodigo(sel), 80); });
    sel.addEventListener("blur",      () => esconderCodigo(sel));
    qtd.addEventListener("input", calcular);
    remover.addEventListener("click", () => { linha.remove(); renumerarProd(); calcular(); });

    linha.appendChild(numero);
    linha.appendChild(sel);
    linha.appendChild(qtd);
    linha.appendChild(remover);
    lista.appendChild(linha);
    renumerarProd();
    calcular();
}

function renumerarProd() {
    document.querySelectorAll(".item-produto .produto-numero").forEach((n, i) => {
        n.textContent = i + 1;
    });
}

// ── ADICIONAR INFRA ──
function adicionarInfra(nome, quantidade) {
    const lista = document.getElementById("listaInfra");
    const linha = document.createElement("div");
    linha.className = "infra-linha item-infra";

    const sel = document.createElement("select");
    sel.className = "infra-select";
    preencherSelectInfra(sel, nome);

    const qtd = document.createElement("input");
    qtd.type = "number"; qtd.className = "produto-qtd";
    qtd.min = "0"; qtd.value = quantidade || 0;

    const remover = document.createElement("button");
    remover.type = "button"; remover.className = "botao-remover";
    remover.innerHTML = "×";

    sel.addEventListener("focus",     () => mostrarCodigo(sel));
    sel.addEventListener("mousedown", () => mostrarCodigo(sel));
    sel.addEventListener("keydown",   () => mostrarCodigo(sel));
    sel.addEventListener("change",    () => { calcular(); setTimeout(() => esconderCodigo(sel), 80); });
    sel.addEventListener("blur",      () => esconderCodigo(sel));
    qtd.addEventListener("input", calcular);
    remover.addEventListener("click", () => { linha.remove(); calcular(); });

    linha.appendChild(sel);
    linha.appendChild(qtd);
    linha.appendChild(remover);
    lista.appendChild(linha);
    calcular();
}

// ── CÁLCULO ──
function calcular() {
    const tipoEl = document.querySelector('input[name="tipo"]:checked');
    const tipo = tipoEl ? tipoEl.value : "analogica";

    let qtdCameras = 0, totalProdutos = 0;
    document.querySelectorAll(".item-produto").forEach(linha => {
        const sel = linha.querySelector(".produto-select");
        const qtd = Number(linha.querySelector(".produto-qtd").value) || 0;
        if (sel.value.startsWith("CAM-")) qtdCameras += qtd;
        totalProdutos += pegarValorProduto(sel.value) * qtd;
    });

    let totalInfra = 0;
    document.querySelectorAll(".item-infra").forEach(linha => {
        const sel = linha.querySelector(".infra-select");
        const qtd = Number(linha.querySelector(".produto-qtd").value) || 0;
        totalInfra += pegarValorInfra(sel.value) * qtd;
    });

    document.getElementById("totalCameras").textContent = qtdCameras;
    let nivel = qtdCameras >= 33 ? "dificil" : qtdCameras >= 9 ? "medio" : qtdCameras >= 1 ? "facil" : "";
    document.getElementById("totalCameras").className = "campo-automatico" + (nivel ? " nivel-" + nivel : "");

    const usarSocio    = document.getElementById("usarSocio").checked;
    const tabelaSolo = {
        analogica: { facil:1.6, medio:1.7, dificil:1.7 },
        ip:        { facil:1.7, medio:1.9, dificil:2.0 },
        wifi:      { facil:2.0, medio:2.1, dificil:2.2 },
        automacao: { facil:2.2, medio:2.4, dificil:2.7 },
        sensores:  { facil:2.0, medio:2.2, dificil:2.3 },
    };
    const tabelaSocio = {
        analogica: { facil:2.1, medio:2.2, dificil:2.2 },
        ip:        { facil:2.3, medio:2.4, dificil:2.6 },
        wifi:      { facil:2.6, medio:2.7, dificil:2.8 },
        automacao: { facil:3.0, medio:3.2, dificil:3.5 },
        sensores:  { facil:2.8, medio:3.0, dificil:3.2 },
    };
    const tabela = usarSocio ? tabelaSocio : tabelaSolo;
    const mult = (tabela[tipo] || tabela.analogica)[nivel];

    const diasTrabalho = Number(document.getElementById("diasTrabalho").value) || 0;
    const diasDiarista = Number(document.getElementById("diasDiarista").value) || 0;

    const deslocamento = 50 * diasTrabalho;
    const diarias      = diasTrabalho * 500 * (usarSocio ? 2 : 1);
    const diarista     = diasDiarista * 120;
    const despesas     = deslocamento + totalInfra + diarias + diarista;
    const valorFinal   = Math.round((totalProdutos * mult + despesas) / 50) * 50;

    document.getElementById("resultado").innerHTML =
        `<span>Valor final do projeto</span>${formatarMoeda(valorFinal)}`;

    document.getElementById("info").innerHTML = `
        <div class="info-resumo">
            <div class="info-linha">
                <span>Equipamentos</span>
                <strong>${formatarMoeda(totalProdutos)}</strong>
            </div>
            <div class="info-linha">
                <span>Infraestrutura</span>
                <strong>${formatarMoeda(totalInfra)}</strong>
            </div>
            <div class="info-linha">
                <span>Serviço e despesas</span>
                <strong>${formatarMoeda(despesas - totalInfra)}</strong>
            </div>
        </div>`;
}

}

document.querySelectorAll('input[name="tipo"]').forEach(cb => {

        this.checked = true;

document.querySelectorAll('input[type="number"]').forEach(c => c.addEventListener("input", calcular));

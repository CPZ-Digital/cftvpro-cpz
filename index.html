<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CPZ Orçamento</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap');

:root {
    --bg:             #0b0d11;
    --surface:        #13161c;
    --surface2:       #1a1e26;
    --border:         #22272f;
    --border2:        #2c3340;
    --blue:           #0A84FF;
    --blue-dim:       #0a2845;
    --blue-glow:      rgba(10,132,255,0.18);
    --text:           #f0f4ff;
    --muted:          #7c8799;
    --label:          #b8c2d0;
    --item-bg:        #1e222a;
    --ok:             #0d3320;
    --warn:           #3d2500;
    --danger:         #3d0f0f;
    --ok-text:        #3dce74;
    --warn-text:      #f5c842;
    --danger-text:    #f47070;
    --dropdown-bg:    #171b22;
    --dropdown-grupo: #111418;
    --input-bg:       #1e222a;
    --input-color:    #f0f4ff;
    --green:          #0f6b2e;
    --green-glow:     rgba(15,107,46,0.3);
    --shadow-card:    0 2px 12px rgba(0,0,0,0.45);
    --shadow-drop:    0 12px 32px rgba(0,0,0,0.6);
}

@media (prefers-color-scheme: light) {
    :root {
        --bg:             #eef1f6;
        --surface:        #ffffff;
        --surface2:       #f5f7fb;
        --border:         #dce1ea;
        --border2:        #c8cfdb;
        --blue-dim:       #e0eeff;
        --blue-glow:      rgba(10,132,255,0.12);
        --text:           #0d1117;
        --muted:          #62707f;
        --label:          #374151;
        --item-bg:        #f5f7fb;
        --ok:             #d4f4e2;
        --warn:           #fef3c7;
        --danger:         #fee2e2;
        --ok-text:        #0f6b2e;
        --warn-text:      #92600a;
        --danger-text:    #c92020;
        --dropdown-bg:    #ffffff;
        --dropdown-grupo: #f0f3f8;
        --input-bg:       #ffffff;
        --input-color:    #0d1117;
        --green:          #0f6b2e;
        --green-glow:     rgba(15,107,46,0.15);
        --shadow-card:    0 2px 10px rgba(0,0,0,0.08);
        --shadow-drop:    0 8px 24px rgba(0,0,0,0.14);
    }
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', Arial, sans-serif;
    padding: 14px 12px 110px;
}

.container {
    max-width: 480px;
    margin: auto;
}

/* ── TOPO ── */
.topo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
    background: var(--surface);
    padding: 14px 18px;
    border-radius: 18px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-card);
}
.topo-texto h2 {
    margin: 0;
    font-size: 21px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
}
.subtitulo {
    margin: 2px 0 0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2px;
}
.logo-empresa {
    height: 34px;
    width: auto;
    border-radius: 6px;
    background: #fff;
    padding: 4px 8px;
}

/* ── CARDS ── */
.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow-card);
}
.card-titulo {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
}

/* ── TIPO PROJETO ── */
.tipos-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 7px;
}
.tipo-btn {
    display: flex; align-items: center; justify-content: center;
    min-height: 44px;
    background: var(--item-bg);
    border: 1.5px solid var(--border2);
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13.5px;
    color: var(--label);
    transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
    user-select: none;
}
.tipo-btn:active { transform: scale(0.97); }
.tipo-btn.ativo {
    background: var(--blue-dim);
    border-color: var(--blue);
    color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-glow);
}
.tipo-btn input { display: none; }

/* ── TOTAL CÂMERAS ── */
.cameras-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    background: var(--item-bg);
    border-radius: 12px;
    margin-top: 10px;
    border: 1px solid var(--border2);
}
.cameras-label { font-size: 13px; font-weight: 600; color: var(--muted); }
.cameras-badge {
    min-width: 50px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 9px;
    background: var(--surface2);
    font-weight: 700; font-size: 19px;
    color: var(--text);
    border: 1.5px solid var(--border2);
    transition: background 0.25s, color 0.25s, border-color 0.25s;
}
.cameras-badge.facil   { background: var(--ok);     color: var(--ok-text);     border-color: transparent; }
.cameras-badge.medio   { background: var(--warn);    color: var(--warn-text);   border-color: transparent; }
.cameras-badge.dificil { background: var(--danger);  color: var(--danger-text); border-color: transparent; }

/* ── ITENS ── */
.item-card {
    background: var(--item-bg);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 11px;
    margin-bottom: 8px;
    animation: slideIn 0.18s ease;
}
@keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
}

.item-topo {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 9px;
}
.item-numero {
    min-width: 26px; height: 26px;
    background: var(--border2);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--muted);
    flex-shrink: 0;
}
.item-busca-wrapper { flex: 1; min-width: 0; position: relative; }

.item-rodape {
    display: flex; align-items: center;
    justify-content: space-between;
    gap: 10px;
}
.item-preco {
    font-size: 13px;
    color: var(--ok-text);
    font-weight: 700;
    flex: 1;
    cursor: pointer;
    user-select: none;
    padding: 2px 0;
}

/* controles +/- */
.qtd-ctrl {
    display: flex; align-items: center;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 9px;
    overflow: hidden;
}
.qtd-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: none;
    border: none;
    color: var(--blue);
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    padding: 0; margin: 0;
    font-family: inherit;
    transition: background 0.12s;
}
.qtd-btn:active { background: var(--blue-dim); }
.qtd-num {
    min-width: 34px;
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    background: none;
    border: none;
    outline: none;
    font-family: inherit;
    padding: 0;
}
.qtd-num::-webkit-inner-spin-button,
.qtd-num::-webkit-outer-spin-button { -webkit-appearance: none; }

.btn-del {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: none;
    border: 1px solid var(--border2);
    border-radius: 9px;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 0; margin: 0;
    font-family: inherit;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.btn-del:active { background: var(--danger); color: var(--danger-text); border-color: transparent; }

/* ── BUSCA ── */
.busca-input {
    width: 100%;
    min-height: 42px;
    padding: 10px 13px;
    border: 1.5px solid var(--border2);
    border-radius: 9px;
    font-size: 14px;
    outline: none;
    font-family: 'DM Sans', Arial, sans-serif;
    background: var(--input-bg);
    color: var(--input-color);
    transition: border-color 0.15s, box-shadow 0.15s;
}
.busca-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-glow);
}
.busca-input::placeholder { color: var(--muted); font-size: 13px; }

.busca-dropdown {
    display: none;
    position: absolute;
    left: 0; right: 0;
    background: var(--dropdown-bg);
    border: 1.5px solid var(--blue);
    border-radius: 12px;
    max-height: 240px;
    overflow-y: auto;
    z-index: 999;
    box-shadow: var(--shadow-drop);
}
.busca-dropdown.aberto { display: block; }

.busca-grupo-label {
    padding: 6px 13px 3px;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    background: var(--dropdown-grupo);
    position: sticky; top: 0;
}
.busca-opcao {
    padding: 10px 13px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    transition: background 0.1s;
}
.busca-opcao:last-child { border-bottom: none; }
.busca-opcao:active { background: var(--blue-dim); }
.opcao-nome { flex: 1; line-height: 1.35; }
.opcao-codigo-txt { font-size: 10px; color: var(--muted); display: block; margin-bottom: 1px; }
.opcao-preco-txt { font-size: 12px; color: var(--ok-text); font-weight: 700; white-space: nowrap; }
.busca-vazio { padding: 16px 13px; color: var(--muted); font-size: 13px; text-align: center; }

/* ── DIAS ── */
.dias-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.dias-item label {
    display: block; font-size: 12px; font-weight: 700;
    color: var(--muted); margin-bottom: 6px; letter-spacing: 0.2px;
}
.dias-item input {
    width: 100%; min-height: 46px;
    padding: 10px 12px;
    border: 1.5px solid var(--border2);
    border-radius: 10px;
    font-size: 18px; font-weight: 700;
    text-align: center;
    background: var(--input-bg);
    color: var(--input-color);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
}
.dias-item input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-glow);
}

/* ── RESULTADO ── */
.resultado-card {
    background: linear-gradient(135deg, #0a5fd4 0%, #0A84FF 60%, #38a1ff 100%);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 10px;
    box-shadow: 0 8px 28px rgba(10,132,255,0.35);
    border: 1px solid rgba(255,255,255,0.12);
}
.resultado-label {
    font-size: 11px;
    color: rgba(255,255,255,0.75);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 4px;
}
.resultado-valor { font-size: 36px; font-weight: 700; color: white; line-height: 1; letter-spacing: -0.5px; }

.resumo-toggle {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 14px; cursor: pointer;
    font-size: 12px; color: rgba(255,255,255,0.7);
    user-select: none;
    font-weight: 500;
}
.resumo-toggle .seta { transition: transform 0.2s; font-size: 10px; }
.resumo-toggle.aberto .seta { transform: rotate(180deg); }

.resumo-itens {
    display: none;
    margin-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.18);
    padding-top: 12px;
    gap: 8px;
    flex-direction: column;
}
.resumo-itens.visivel { display: flex; }
.resumo-linha {
    display: flex; justify-content: space-between; gap: 12px;
    font-size: 13px; color: rgba(255,255,255,0.75);
}
.resumo-linha strong { color: white; font-weight: 700; }

/* ── BOTÕES FIXOS ── */
.fab-area {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 10px 14px 20px;
    background: linear-gradient(to top, var(--bg) 65%, transparent);
    display: flex; gap: 9px;
    max-width: 504px;
    margin: auto;
    z-index: 100;
}
.fab {
    flex: 1; min-height: 50px;
    border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    letter-spacing: 0.1px;
    transition: filter 0.15s, transform 0.1s;
}
.fab:active { transform: scale(0.97); filter: brightness(0.9); }
.fab-azul {
    background: var(--blue);
    color: white;
    box-shadow: 0 4px 16px rgba(10,132,255,0.4);
}
.fab-ghost {
    background: var(--surface);
    border: 1.5px solid var(--border2);
    color: var(--muted);
    flex: 0 0 50px;
    font-size: 19px;
}

/* ── TOAST ── */
.toast {
    position: fixed;
    bottom: 82px; left: 50%;
    transform: translateX(-50%) translateY(14px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 50px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
    z-index: 9999;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    letter-spacing: 0.1px;
}
.toast.visivel {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* ── ADD ROW ── */
.add-row {
    display: flex; gap: 8px; margin-top: 6px;
}
.add-row button {
    flex: 1; min-height: 42px; margin: 0;
    border-radius: 10px; font-size: 14px;
    background: var(--green); color: white;
    border: none; font-family: inherit; font-weight: 700; cursor: pointer;
    letter-spacing: 0.1px;
    box-shadow: 0 2px 10px var(--green-glow);
    transition: filter 0.15s, transform 0.1s;
}
.add-row button:active { filter: brightness(0.9); transform: scale(0.98); }

/* ── MODAL PAGAMENTO ── */
.pag-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 100;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.22s;
}
.pag-overlay.aberto { opacity: 1; pointer-events: all; }
.pag-modal {
    background: var(--surface);
    border-radius: 22px 22px 0 0;
    border-top: 1px solid var(--border);
    width: 100%; max-height: 88vh;
    overflow-y: auto;
    padding: 18px 16px 44px;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(.32,.72,0,1);
}
.pag-overlay.aberto .pag-modal { transform: translateY(0); }

.pag-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
}
.pag-titulo { font-size: 17px; font-weight: 700; color: var(--text); }
.pag-fechar {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 10px; font-size: 16px;
    color: var(--muted); cursor: pointer;
    font-family: inherit;
}

.pag-tabs {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 6px; margin-bottom: 14px;
}
.pag-tab {
    padding: 9px 4px; text-align: center;
    font-size: 12px; font-weight: 600;
    color: var(--muted);
    background: var(--item-bg);
    border: 1.5px solid var(--border2);
    border-radius: 10px; cursor: pointer;
    font-family: inherit;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.pag-tab.ativo {
    background: var(--blue-dim);
    border-color: var(--blue);
    color: var(--blue);
}

.pag-total-card {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
}
.pag-total-label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.pag-total-valor { font-size: 22px; font-weight: 700; color: var(--text); }

.pag-boleto-ctrl {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.pag-boleto-label { font-size: 13px; color: var(--muted); font-weight: 600; }
.pag-boleto-sel { display: flex; gap: 6px; }
.pag-boleto-opt {
    padding: 6px 10px;
    background: var(--item-bg);
    border: 1.5px solid var(--border2);
    border-radius: 8px;
    font-size: 13px; font-weight: 700;
    color: var(--muted); cursor: pointer;
    font-family: inherit;
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.pag-boleto-opt .opt-parc-val {
    font-size: 10px; font-weight: 500; opacity: 0.75; white-space: nowrap;
}
.pag-boleto-opt.ativo {
    background: var(--blue-dim); border-color: var(--blue); color: var(--blue);
}
.pag-boleto-opt.ativo .opt-parc-val { opacity: 1; }

.pag-parc {
    background: var(--item-bg); border: 1px solid var(--border2);
    border-left: 3px solid var(--border2);
    border-radius: 12px; padding: 12px; margin-bottom: 8px;
    transition: border-left-color 0.2s;
}
.pag-parc.acum-pos { border-left-color: var(--ok-text); }
.pag-parc.acum-neg { border-left-color: var(--danger-text); }
.pag-parc-titulo {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px;
}
.pag-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 2px 0;
}
.pag-row-label { font-size: 13px; color: var(--muted); }
.pag-row-val { font-size: 13px; font-weight: 700; }
.pag-saidas-label {
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin: 4px 0 2px;
    opacity: 0.7;
}
.pag-row-sub { padding: 1px 0; }
.pag-row-sub .pag-row-label { font-size: 12px; padding-left: 10px; }
.pag-row-sub .pag-row-val   { font-size: 12px; }
.pag-row-val.verde  { color: var(--ok-text); }
.pag-row-val.vermelho { color: var(--danger-text); }
.pag-row-val.amarelo { color: var(--warn-text); }
.pag-sep { height: 1px; background: var(--border2); margin: 6px 0; }
.pag-saldo-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 0;
}
.pag-saldo-label { font-size: 13px; font-weight: 700; color: var(--label); }
.pag-saldo-val { font-size: 15px; font-weight: 700; }

.pag-resumo {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; margin-top: 10px;
}
.pag-resumo-titulo {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 10px;
}

</style>
</head>
<body>

<div class="container">

    <!-- TOPO -->
    <div class="topo">
        <div class="topo-texto">
            <h2 id="tituloApp" style="cursor:default;user-select:none;">Orçamento</h2>
            <p class="subtitulo" id="subtituloApp">CPZ Digital</p>
        </div>
        <img class="logo-empresa" src="cpz-assinatura.png" alt="CPZ Digital">
    </div>

    <!-- TIPO -->
    <div class="card">
        <div class="card-titulo">Tipo do projeto</div>
        <div class="tipos-grid" id="tiposGrid">
            <label class="tipo-btn ativo"><input type="checkbox" name="tipo" value="analogica" checked>Analógica</label>
            <label class="tipo-btn"><input type="checkbox" name="tipo" value="ip">IP</label>
            <label class="tipo-btn"><input type="checkbox" name="tipo" value="wifi">Wi-Fi</label>
            <label class="tipo-btn"><input type="checkbox" name="tipo" value="automacao">Automação</label>
            <label class="tipo-btn"><input type="checkbox" name="tipo" value="sensores">Sensores</label>
        </div>
        <input type="checkbox" id="usarSocio" style="display:none;">

        <div class="cameras-row">
            <span class="cameras-label">Total de câmeras</span>
            <span class="cameras-badge" id="totalCameras">0</span>
        </div>
    </div>

    <!-- PRODUTOS -->
    <div class="card">
        <div class="card-titulo">Itens do projeto</div>
        <div id="listaProdutos"></div>

<script>

const URL_PRODUTOS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg5zxUiq6B03q8unGatN0ATJz1aLR89j34Xe3Z0-a8DFQyh3k-HpZsMngRxVTyrK9quopeBKCHTGlw/pub?gid=1778121456&single=true&output=csv";
const URL_INFRA    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg5zxUiq6B03q8unGatN0ATJz1aLR89j34Xe3Z0-a8DFQyh3k-HpZsMngRxVTyrK9quopeBKCHTGlw/pub?gid=1725487429&single=true&output=csv";

let produtos   = [];
let itensInfra = [];

const ordemCategorias = [
    "Câmeras","Gravadores","Armazenamento","Cabos",
    "Infraestrutura","Rede","Energia","Automação","Acessórios"
];

const fmt = v => v.toLocaleString("pt-BR", { style:"currency", currency:"BRL" });

function simplificarNome(nome) {
    return nome.trim().replace(/\s+/g," ")
        .replace(/CAMERA/gi,"Câmera").replace(/ANALOGICA/gi,"analógica")
        .replace(/BRANCA/gi,"branca").replace(/PRETA/gi,"preta")
        .replace(/CAIXA DE PASSAGEM/gi,"caixa de passagem")
        .replace(/CONVERSOR AUTOMATICO/gi,"Conversor automático")
        .replace(/PROTETOR ELETRONICO/gi,"Protetor eletrônico")
        .replace(/SWITCH NAO GERENCIAVEL/gi,"Switch não gerenciável")
        .replace(/INTERRUPTOR/gi,"Interruptor").replace(/CARTAO/gi,"Cartão")
        .replace(/CABO/gi,"Cabo").replace(/MINI RACK/gi,"Mini rack")
        .replace(/NOBREAK/gi,"Nobreak").replace(/CANAIS/gi,"canais")
        .replace(/PORTAS/gi,"portas").replace(/TOMADAS/gi,"tomadas")
        .replace(/PACOTE COM/gi,"pacote com").replace(/UNIDADES/gi,"unidades")
        .replace(/BORNE DE PARAFUSO/gi,"borne de parafuso")
        .replace(/ALIMENTACAO/gi,"alimentação").replace(/ALIMENTAÇÃO/gi,"alimentação")
        .replace(/p\/SEGURANCA ELETRONICA/gi,"para segurança eletrônica")
        .replace(/SEGURANCA ELETRONICA/gi,"segurança eletrônica")
        .replace(/P\/RACK/gi,"para rack").replace(/S\/FIO/gi,"sem fio")
        .replace(/s\/HD/g,"sem HD").replace(/c\/HD/g,"com HD")
        .replace(/c\/MICROSD/gi,"com MicroSD").replace(/\s*-\s*/g," - ");
}

function categoriaProduto(codigo) {
    if (codigo.startsWith("CAM-"))                              return "Câmeras";
    if (codigo.startsWith("DVR")||codigo.startsWith("NVR"))     return "Gravadores";
    if (codigo.startsWith("ARM-"))                             return "Armazenamento";
    if (codigo.startsWith("CAB-"))                             return "Cabos";
    if (codigo.startsWith("INF-"))                             return "Infraestrutura";
    if (codigo.startsWith("SW")||codigo.startsWith("RED-"))    return "Rede";
    if (codigo.startsWith("ENG-"))                             return "Energia";
    if (codigo.startsWith("AUT-"))                             return "Automação";
    return "Acessórios";
}

function parseCsv(texto, temCodigo) {
    const linhas = texto.trim().split(/\r?\n/);
    if (linhas.length < 2) return [];
    const sep = linhas[0].includes(";") ? ";" : ",";
    const res = [];
    for (let i = 1; i < linhas.length; i++) {
        const linha = linhas[i].trim(); if (!linha) continue;
        const campos = []; let atual = "", q = false;
        for (let c = 0; c < linha.length; c++) {
            if (linha[c]==='"') q=!q;
            else if (linha[c]===sep && !q) { campos.push(atual.trim()); atual=""; }
            else atual+=linha[c];
        }
        campos.push(atual.trim());
        if (temCodigo) {
            if (campos.length<3) continue;
            const codigo=campos[0].replace(/^"|"$/g,"").trim();
            const nome=campos[1].replace(/^"|"$/g,"").trim();
            const valor=parseFloat(campos[2].replace(/^"|"$/g,"").replace(",",".").trim());
            if (!codigo||!nome||isNaN(valor)) continue;
            res.push({codigo, nome:simplificarNome(nome), valor});
        } else {
            if (campos.length<5) continue;
            const nome=campos[1].replace(/^"|"$/g,"").trim();
            const valor=parseFloat(campos[4].replace(/^"|"$/g,"").replace(",",".").replace(/[^\d.]/g,"").trim());
            if (!nome||isNaN(valor)) continue;
            res.push({nome:simplificarNome(nome), valor});
        }
    }
    return res;
}

async function carregarBanco() {
    try {
        const r = await fetch(URL_PRODUTOS);
        if (r.ok) { const l=parseCsv(await r.text(),true); if(l.length) produtos=l; }
    } catch(e) { console.error("Produtos:",e.message); }
    try {
        const r = await fetch(URL_INFRA);
        if (r.ok) { const l=parseCsv(await r.text(),false); if(l.length) itensInfra=l; }
    } catch(e) { console.error("Infra:",e.message); }
}

// ── COMPONENTE DE BUSCA ──
function criarBusca(listaOpcoes, placeholder, valorInicial, onSelect) {
    let opcoes = listaOpcoes;
    const wrapper = document.createElement("div");
    wrapper.className = "item-busca-wrapper";

    const input = document.createElement("input");
    input.type="text"; input.className="busca-input";
    input.placeholder=placeholder; input.autocomplete="off";
    input.setAttribute("inputmode","search");

    const dropdown = document.createElement("div");
    dropdown.className="busca-dropdown";

    wrapper.appendChild(input);
    wrapper.appendChild(dropdown);

    if (valorInicial) {
        const opt = opcoes.find(o=>o.valor===valorInicial);
        if (opt) { input.value=opt.label; input.dataset.valor=opt.valor; }
    }

    function renderDropdown(filtro) {
        dropdown.innerHTML="";
        const termo=filtro.toLowerCase();
        let grupoAtual=null;
        let count=0;
        opcoes.forEach(opt => {
            const match=!termo||opt.label.toLowerCase().includes(termo)||(opt.sublabel||"").toLowerCase().includes(termo)||(opt.grupo||"").toLowerCase().includes(termo);
            if (!match) return;
            if (opt.grupo && opt.grupo!==grupoAtual) {
                grupoAtual=opt.grupo;
                const g=document.createElement("div");
                g.className="busca-grupo-label"; g.textContent=opt.grupo;
                dropdown.appendChild(g);
            }
            const el=document.createElement("div");
            el.className="busca-opcao";
            el.innerHTML=`<div class="opcao-nome">${opt.sublabel?`<span class="opcao-codigo-txt">${opt.sublabel}</span>`:""}<span>${opt.label}</span></div><span class="opcao-preco-txt">${opt.preco||""}</span>`;
            let _touchStartY=0, _touchMoved=false;
            el.addEventListener("touchstart",e=>{ _touchStartY=e.touches[0].clientY; _touchMoved=false; },{passive:true});
            el.addEventListener("touchmove",e=>{ if(Math.abs(e.touches[0].clientY-_touchStartY)>8) _touchMoved=true; },{passive:true});
            el.addEventListener("touchend",e=>{ if(!_touchMoved){e.preventDefault();selecionar(opt);} },{passive:false});
            el.addEventListener("mousedown",e=>{e.preventDefault();selecionar(opt);});
            dropdown.appendChild(el);
            count++;
        });
        if (!count) {
            const v=document.createElement("div");
            v.className="busca-vazio";
            v.textContent=termo?"Nenhum item encontrado":"Nenhum item disponível";
            dropdown.appendChild(v);
        }
    }

    function abrirDropdown() {
        renderDropdown(input.dataset.valor ? "" : input.value);
        const rect=input.getBoundingClientRect();
        const espacoAbaixo=window.innerHeight-rect.bottom;
        if (espacoAbaixo<280) { dropdown.style.top="auto"; dropdown.style.bottom="calc(100% + 4px)"; }
        else { dropdown.style.top="calc(100% + 4px)"; dropdown.style.bottom="auto"; }
        dropdown.classList.add("aberto");
    }

    function fecharDropdown() {
        dropdown.classList.remove("aberto");
        if (input.dataset.valor) {
            const opt=opcoes.find(o=>o.valor===input.dataset.valor);
            if (opt) input.value=opt.label;
        } else { input.value=""; }
    }

    function selecionar(opt) {
        input.value=opt.label; input.dataset.valor=opt.valor;
        input.blur(); fecharDropdown(); onSelect(opt.valor);
    }

    input.addEventListener("focus",()=>{ input.select(); abrirDropdown(); });
    input.addEventListener("input",()=>{ input.dataset.valor=""; abrirDropdown(); renderDropdown(input.value); onSelect(""); });
    input.addEventListener("blur",()=>{ setTimeout(fecharDropdown,200); });

    wrapper.getValor=()=>input.dataset.valor||"";
    wrapper.setOpcoes=(novas)=>{ opcoes=novas; if(valorInicial){const o=opcoes.find(x=>x.valor===valorInicial);if(o){input.value=o.label;input.dataset.valor=o.valor;}} };
    return wrapper;
}

function opcoesParaProdutos() {
    const res=[];
    ordemCategorias.forEach(cat=>{
        produtos.filter(p=>categoriaProduto(p.codigo)===cat).forEach(p=>{
            res.push({valor:p.codigo,label:p.nome,sublabel:p.codigo,grupo:cat,preco:fmt(p.valor)});
        });
    });
    return res;
}

function opcoesParaInfra() {
    return itensInfra.map(i=>({valor:i.nome,label:i.nome,sublabel:"",grupo:"",preco:fmt(i.valor)}));
}

// ── ADICIONAR PRODUTO ──
let contadorProd=0;

function adicionarProduto(codigo, quantidade) {
    contadorProd++;
    const lista=document.getElementById("listaProdutos");
    const card=document.createElement("div");
    card.className="item-card item-produto";

    const topo=document.createElement("div"); topo.className="item-topo";
    const numero=document.createElement("div"); numero.className="item-numero"; numero.textContent=contadorProd;
    const busca=criarBusca(opcoesParaProdutos(),"Buscar produto...",codigo||"",()=>atualizarPrecoItem(card,true));
    topo.appendChild(numero); topo.appendChild(busca);

    const rodape=document.createElement("div"); rodape.className="item-rodape";
    const preco=document.createElement("div"); preco.className="item-preco"; preco.textContent="—";

    const ctrl=document.createElement("div"); ctrl.className="qtd-ctrl";
    const btnMenos=document.createElement("button"); btnMenos.className="qtd-btn"; btnMenos.textContent="−"; btnMenos.type="button";
    const qtdInput=document.createElement("input"); qtdInput.type="number"; qtdInput.className="qtd-num"; qtdInput.min="0"; qtdInput.value=quantidade||0;
    const btnMais=document.createElement("button"); btnMais.className="qtd-btn"; btnMais.textContent="+"; btnMais.type="button";
    ctrl.appendChild(btnMenos); ctrl.appendChild(qtdInput); ctrl.appendChild(btnMais);

    const btnDel=document.createElement("button"); btnDel.className="btn-del"; btnDel.innerHTML="🗑"; btnDel.type="button";

    rodape.appendChild(preco); rodape.appendChild(ctrl); rodape.appendChild(btnDel);
    card.appendChild(topo); card.appendChild(rodape);
    lista.appendChild(card);

    btnMais.addEventListener("click",()=>{ qtdInput.value=Math.max(0,Number(qtdInput.value)||0)+1; atualizarPrecoItem(card,true); });
    btnMenos.addEventListener("click",()=>{ qtdInput.value=Math.max(0,(Number(qtdInput.value)||0)-1); atualizarPrecoItem(card,true); });
    qtdInput.addEventListener("input",()=>atualizarPrecoItem(card,true));
    qtdInput.addEventListener("focus",()=>{ if(qtdInput.value==="0") qtdInput.value=""; });
    qtdInput.addEventListener("blur",()=>{ if(qtdInput.value==="") { qtdInput.value="0"; calcular(); } });
    btnDel.addEventListener("click",()=>{ card.remove(); renumerarProd(); calcular(); });
    preco.addEventListener("click",()=>ativarEdicaoPreco(card));
    preco.title="Toque para editar o valor";

    renumerarProd();
    atualizarPrecoItem(card,true);
}

function atualizarPrecoItem(card, recalcular) {
    const busca=card.querySelector(".item-busca-wrapper");
    const qtd=Number(card.querySelector(".qtd-num").value)||0;
    const precoEl=card.querySelector(".item-preco");
    const codigo=busca?busca.getValor():"";
    const p=produtos.find(x=>x.codigo===codigo);
    if (!precoEl.dataset.manual) {
        if (p) {
            precoEl.dataset.valorUnit = p.valor;
            precoEl.textContent = qtd>0 ? fmt(p.valor*qtd)+" ✎" : fmt(p.valor)+" / un. ✎";
        } else {
            precoEl.dataset.valorUnit = "";
            precoEl.textContent="—";
        }
    }
    if (recalcular) calcular();
}

function renumerarProd() {
    const itens=[...document.querySelectorAll(".item-produto")];
    itens.forEach((n,i)=>{ n.querySelector(".item-numero").textContent=i+1; });
}

function adicionarInfra(nome, quantidade) {
    const lista=document.getElementById("listaInfra");
    const card=document.createElement("div");
    card.className="item-card item-infra";

    const topo=document.createElement("div"); topo.className="item-topo";

    const ctrl=document.createElement("div"); ctrl.className="qtd-ctrl";
    const btnMenos=document.createElement("button"); btnMenos.className="qtd-btn"; btnMenos.textContent="−"; btnMenos.type="button";
    const qtdInput=document.createElement("input"); qtdInput.type="number"; qtdInput.className="qtd-num"; qtdInput.min="0"; qtdInput.value=quantidade||0;
    const btnMais=document.createElement("button"); btnMais.className="qtd-btn"; btnMais.textContent="+"; btnMais.type="button";
    ctrl.appendChild(btnMenos); ctrl.appendChild(qtdInput); ctrl.appendChild(btnMais);

    const btnDel=document.createElement("button"); btnDel.className="btn-del"; btnDel.innerHTML="🗑"; btnDel.type="button";

    rodape.appendChild(preco); rodape.appendChild(ctrl); rodape.appendChild(btnDel);
    card.appendChild(topo); card.appendChild(rodape);
    lista.appendChild(card);

    btnMais.addEventListener("click",()=>{ qtdInput.value=Math.max(0,Number(qtdInput.value)||0)+1; atualizarPrecoInfra(card,true); });
    btnMenos.addEventListener("click",()=>{ qtdInput.value=Math.max(0,(Number(qtdInput.value)||0)-1); atualizarPrecoInfra(card,true); });
    qtdInput.addEventListener("input",()=>atualizarPrecoInfra(card,true));
    qtdInput.addEventListener("focus",()=>{ if(qtdInput.value==="0") qtdInput.value=""; });
    qtdInput.addEventListener("blur",()=>{ if(qtdInput.value==="") { qtdInput.value="0"; calcular(); } });

function atualizarPrecoInfra(card, recalcular) {
    const busca=card.querySelector(".item-busca-wrapper");
    const qtd=Number(card.querySelector(".qtd-num").value)||0;
    const precoEl=card.querySelector(".item-preco");
    const nome=busca?busca.getValor():"";
    const p=itensInfra.find(x=>x.nome===nome);
    if (!precoEl.dataset.manual) {
        if (p) {
            precoEl.dataset.valorUnit = p.valor;
            precoEl.textContent = qtd>0 ? fmt(p.valor*qtd)+" ✎" : fmt(p.valor)+" / un. ✎";
        } else {
            precoEl.dataset.valorUnit = "";
            precoEl.textContent="—";
        }
    }
    if (recalcular) calcular();
}

// ── EDIÇÃO DE PREÇO ──
function ativarEdicaoPreco(card) {
    const precoEl = card.querySelector(".item-preco");
    const qtd = Number(card.querySelector(".qtd-num").value) || 1;
    const valorAtual = parseFloat(precoEl.dataset.valorUnit) || 0;

    const input = document.createElement("input");
    input.type = "number";
    input.step = "0.01";
    input.min = "0";
    input.value = valorAtual || "";
    input.placeholder = "Valor unit. (R$)";
    input.style.cssText = "width:110px;height:32px;padding:4px 8px;border-radius:7px;border:1.5px solid var(--blue);background:var(--input-bg);color:var(--input-color);font-size:13px;font-weight:700;font-family:inherit;outline:none;";

    precoEl.textContent = "";
    precoEl.appendChild(input);
    input.focus(); input.select();

    function confirmar() {
        const novo = parseFloat(input.value);
        if (!isNaN(novo) && novo >= 0) {
            precoEl.dataset.valorUnit = novo;
            precoEl.dataset.manual = "1";
            precoEl.textContent = qtd > 0 ? fmt(novo * qtd) + " ✎" : fmt(novo) + " / un. ✎";
        } else {
            precoEl.dataset.manual = "";
            precoEl.textContent = valorAtual > 0 ? fmt(valorAtual * qtd) + " ✎" : "—";
        }
        calcular();
    }

    input.addEventListener("blur", confirmar);
    input.addEventListener("keydown", e => { if (e.key === "Enter") { input.blur(); } if (e.key === "Escape") { precoEl.dataset.manual=""; input.blur(); } });
}

// ── CÁLCULO ──
function calcular() {
    const tipoEl=document.querySelector('input[name="tipo"]:checked');
    const tipo=tipoEl?tipoEl.value:"analogica";
    const usarSocio=document.getElementById("usarSocio").checked;

    let qtdCameras=0, totalProd=0;
    document.querySelectorAll(".item-produto").forEach(card=>{
        const busca=card.querySelector(".item-busca-wrapper");
        const codigo=busca?busca.getValor():"";
        const qtd=Number(card.querySelector(".qtd-num").value)||0;
        if (codigo.startsWith("CAM-")) qtdCameras+=qtd;
        const precoEl=card.querySelector(".item-preco");
        const valorUnit=parseFloat(precoEl.dataset.valorUnit)||0;
        totalProd+=valorUnit*qtd;
    });

    let totalInfra=0;
    document.querySelectorAll(".item-infra").forEach(card=>{
        const qtd=Number(card.querySelector(".qtd-num").value)||0;
        const precoEl=card.querySelector(".item-preco");
        const valorUnit=parseFloat(precoEl.dataset.valorUnit)||0;
        totalInfra+=valorUnit*qtd;
    });

    const cam=document.getElementById("totalCameras");
    cam.textContent=qtdCameras;
    let nivel=qtdCameras>=33?"dificil":qtdCameras>=9?"medio":qtdCameras>=1?"facil":"";
    cam.className="cameras-badge"+(nivel?" "+nivel:"");

    const tS={analogica:{facil:1.6,medio:1.7,dificil:1.7},ip:{facil:1.7,medio:1.9,dificil:2.0},wifi:{facil:2.0,medio:2.1,dificil:2.2},automacao:{facil:2.2,medio:2.4,dificil:2.7},sensores:{facil:2.0,medio:2.2,dificil:2.3}};
    const tSo={analogica:{facil:2.1,medio:2.2,dificil:2.2},ip:{facil:2.3,medio:2.4,dificil:2.6},wifi:{facil:2.6,medio:2.7,dificil:2.8},automacao:{facil:3.0,medio:3.2,dificil:3.5},sensores:{facil:2.8,medio:3.0,dificil:3.2}};
    const tab=usarSocio?tSo:tS;
    const mult=(tab[tipo]||tab.analogica)[nivel||"facil"];

    const diasT=Number(document.getElementById("diasTrabalho").value)||0;
    const diasD=Number(document.getElementById("diasDiarista").value)||0;
    const desl=50*diasT;
    const diarias=diasT*500*(usarSocio?2:1);
    const diarista=diasD*120;
    const despesas=desl+totalInfra+diarias+diarista;
    const valorFinal=Math.round((totalProd*mult+despesas)/50)*50;

    document.getElementById("resultadoValor").textContent=fmt(valorFinal);
    document.getElementById("rEquip").textContent=fmt(totalProd);
    document.getElementById("rInfra").textContent=fmt(totalInfra);
    document.getElementById("rServico").textContent=fmt(despesas-totalInfra);

    _pag = { valorFinal, totalProd, totalInfra, desl, diarias, diarista };

    salvarEstado();
}

function salvarEstado() {
    const estado={
        tipo:document.querySelector('input[name="tipo"]:checked')?.value||"analogica",
        socio:document.getElementById("usarSocio").checked,
        diasTrabalho:document.getElementById("diasTrabalho").value,
        diasDiarista:document.getElementById("diasDiarista").value,
        produtos:[], infra:[]
    };
    const prods=[...document.querySelectorAll(".item-produto")];
    prods.forEach(card=>{
        const busca=card.querySelector(".item-busca-wrapper");
        estado.produtos.push({codigo:busca?busca.getValor():"", qtd:card.querySelector(".qtd-num").value});
    });
    const infras=[...document.querySelectorAll(".item-infra")];
    infras.forEach(card=>{
        const busca=card.querySelector(".item-busca-wrapper");
        estado.infra.push({nome:busca?busca.getValor():"", qtd:card.querySelector(".qtd-num").value});
    });
    localStorage.setItem("cpz_estado",JSON.stringify(estado));
}

function restaurarEstado() {
    try {
        const raw=localStorage.getItem("cpz_estado");
        if (!raw) return false;
        const e=JSON.parse(raw);
        document.querySelectorAll('input[name="tipo"]').forEach(cb=>{
            cb.checked=cb.value===e.tipo;
            cb.closest(".tipo-btn").classList.toggle("ativo",cb.value===e.tipo);
        });
        const socio=document.getElementById("usarSocio");
        socio.checked=e.socio||false;
        document.getElementById("subtituloApp").textContent=socio.checked?"BA Vision":"CPZ Digital";
        if (e.diasTrabalho) document.getElementById("diasTrabalho").value=e.diasTrabalho;
        if (e.diasDiarista) document.getElementById("diasDiarista").value=e.diasDiarista;
        if (e.produtos&&e.produtos.length) e.produtos.forEach(p=>adicionarProduto(p.codigo,p.qtd));
        else adicionarProduto();
        if (e.infra&&e.infra.length) e.infra.forEach(i=>adicionarInfra(i.nome,i.qtd));
        else adicionarInfra();
        return true;
    } catch(err) { console.error(err); return false; }
}

function limparOrcamento() {
    if (!confirm("Apagar o orçamento e começar do zero?")) return;
    localStorage.removeItem("cpz_estado");
    document.getElementById("listaProdutos").innerHTML="";
    document.getElementById("listaInfra").innerHTML="";
    document.querySelectorAll('input[name="tipo"]').forEach((cb,i)=>{
        cb.checked=i===0; cb.closest(".tipo-btn").classList.toggle("ativo",i===0);
    });
    document.getElementById("usarSocio").checked=false;
    document.getElementById("subtituloApp").textContent="CPZ Digital";
    document.getElementById("diasTrabalho").value=1;
    document.getElementById("diasDiarista").value=1;
    adicionarProduto(); adicionarInfra(); calcular();
}

// ── PAGAMENTO ──
let _pag       = { valorFinal:0, totalProd:0, totalInfra:0, desl:0, diarias:0, diarista:0 };
let _pagModo   = 'avista';  // 'avista' | 'boleto' | 'cartao'
let _subAvista = '5050';    // '5050'  | '4pix'
let _nPix      = 4;         // 2-4
let _nBoleto   = 4;         // 2-6
let _nCartao   = 4;         // 2-6

function abrirPagamentos() {
    renderPagamento();
    document.getElementById('pagOverlay').classList.add('aberto');
    document.querySelector('.fab-area').style.display = 'none';
}

function fecharPagamentos() {
    document.getElementById('pagOverlay').classList.remove('aberto');
    document.querySelector('.fab-area').style.display = '';
}

document.getElementById('pagOverlay').addEventListener('click', function(e) {
    if (e.target === this) fecharPagamentos();
});

function setPagModo(modo) {
    _pagModo = modo;
    const modos = ['avista','boleto','cartao'];
    document.querySelectorAll('.pag-tab').forEach((t,i) => t.classList.toggle('ativo', modos[i] === modo));
    renderPagamento();
}

function setSubAvista(sub) { _subAvista = sub; renderPagamento(); }
function setNPix(n)        { _nPix      = n;   renderPagamento(); }
function setNBoleto(n)     { _nBoleto   = n;   renderPagamento(); }
function setNCartao(n)     { _nCartao   = n;   renderPagamento(); }

function calcInstallments() {
    const { valorFinal, totalProd, totalInfra, desl, diarias, diarista } = _pag;
    const r50 = v => Math.round(v / 50) * 50;
    const mkParc = (label, recebe, despMat, despInfra, despDesl, despDiar, adriano) => {
        const desp  = despMat + despInfra + despDesl + despDiar;
        const saldo = recebe - desp;
        return { label, recebe, despMat, despInfra, despDesl, despDiar, desp, adriano, saldo, caixa: saldo - adriano };
    };

    // helper: N parcelas — infra/desl/diarista na P1, material de matStart em diante
    function gerarParcelas(total, N, matStart) {
        const parc   = total / N;
        const adPerc = diarias / N;
        const matN   = N - matStart + 1;
        const matPer = matN > 0 ? totalProd / matN : 0;
        const result = [];
        for (let i = 1; i <= N; i++) {
            const isMat = i >= matStart;
            result.push(mkParc(
                `${i}ª parcela`, parc,
                isMat ? matPer : 0,
                i === 1 ? totalInfra : 0,
                i === 1 ? desl : 0,
                i === 1 ? diarista : 0,
                adPerc
            ));
        }
        return { total, parcelas: result };
    }

    if (_pagModo === 'avista') {
        const total = valorFinal;
        if (_subAvista === '5050') {
            const meia = total / 2;
            return { total, parcelas: [
                mkParc('Sinal (50%)', meia, 0,          totalInfra, desl, 0,        0),
                mkParc('Final (50%)', meia, totalProd,  0,          0,    diarista,  diarias)
            ]};
        }
        // N× Pix — material nas parcelas 2-N
        return gerarParcelas(total, _nPix, 2);
    }

    if (_pagModo === 'boleto') {
        const total = r50(valorFinal * 1.05);
        return gerarParcelas(total, _nBoleto, 2);
    }

    if (_pagModo === 'cartao') {
        // Cartão +10% | material distribuído em todas as N parcelas
        const N      = _nCartao;
        const total  = r50(valorFinal * 1.10);
        const parc   = total / N;
        const adPerc = diarias / N;
        const matPer = totalProd / N;
        const parcelas = [];
        for (let i = 1; i <= N; i++) {
            parcelas.push(mkParc(
                `${i}ª parcela`, parc,
                matPer,
                i === 1 ? totalInfra : 0,
                i === 1 ? desl : 0,
                i === 1 ? diarista : 0,
                adPerc
            ));
        }
        return { total, parcelas };
    }
}

function renderPagamento() {
    const data      = calcInstallments();
    const socio     = document.getElementById('usarSocio').checked;
    const lblDiaria = socio ? 'Diárias' : 'Adriano';
    const cor       = v => v >= 0 ? 'verde' : 'vermelho';
    let html = '';

    const totalDesc = {
        avista: _subAvista === '5050' ? 'Pix — 50% + 50%' : 'Pix — 4×',
        boleto: `Boleto — ${_nBoleto}×`,
        cartao: `Cartão — ${_nCartao}×`
    }[_pagModo];

    html += `<div class="pag-total-card">
        <div>
            <div class="pag-total-label">Total</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${totalDesc}</div>
        </div>
        <span class="pag-total-valor">${fmt(data.total)}</span>
    </div>`;

    const r50 = v => Math.round(v / 50) * 50;
    const mkOpts = (opts, nAtual, setter) =>
        opts.map(n =>
            `<button class="pag-boleto-opt ${n===nAtual?'ativo':''}" onclick="${setter}(${n})">${n}×</button>`
        ).join('');

    if (_pagModo === 'avista') {
        html += `<div class="pag-boleto-ctrl">
            <span class="pag-boleto-label">Forma:</span>
            <div class="pag-boleto-sel">
                <button class="pag-boleto-opt ${_subAvista==='5050'?'ativo':''}" onclick="setSubAvista('5050')">50%+50%</button>
                <button class="pag-boleto-opt ${_subAvista==='4pix'?'ativo':''}" onclick="setSubAvista('4pix')">Pix</button>
            </div>
        </div>`;
        if (_subAvista === '4pix') {
            html += `<div class="pag-boleto-ctrl">
                <span class="pag-boleto-label">Parcelas:</span>
                <div class="pag-boleto-sel">
                    ${mkOpts([2,3,4], _nPix, 'setNPix')}
                </div>
            </div>`;
        }
    }

    if (_pagModo === 'boleto') {
        html += `<div class="pag-boleto-ctrl">
            <span class="pag-boleto-label">Parcelas:</span>
            <div class="pag-boleto-sel">
                ${mkOpts([2,3,4,5,6], _nBoleto, 'setNBoleto')}
            </div>
        </div>`;
    }

    if (_pagModo === 'cartao') {
        html += `<div class="pag-boleto-ctrl">
            <span class="pag-boleto-label">Parcelas:</span>
            <div class="pag-boleto-sel">
                ${mkOpts([2,3,4,5,6], _nCartao, 'setNCartao')}
            </div>
        </div>`;
    }

    let acum = 0;
    data.parcelas.forEach((p, idx) => {
        const acumBefore = acum;
        acum += p.caixa;

        // No 50/50, a 2ª parcela usa o saldo do sinal para cobrir as saídas
        const carry = (_pagModo === 'avista' && _subAvista === '5050' && idx > 0 && acumBefore > 0)
            ? acumBefore : 0;
        const totalDisp  = p.recebe + carry;
        const saldoDisp  = totalDisp - p.desp;

        const saidasRows = [
            p.despInfra > 0 ? `<div class="pag-row pag-row-sub">
                <span class="pag-row-label">Infra/equip.</span>
                <span class="pag-row-val vermelho">−${fmt(p.despInfra)}</span>
            </div>` : '',
            p.despDesl > 0 ? `<div class="pag-row pag-row-sub">
                <span class="pag-row-label">Deslocamento</span>
                <span class="pag-row-val vermelho">−${fmt(p.despDesl)}</span>
            </div>` : '',
            p.despDiar > 0 ? `<div class="pag-row pag-row-sub">
                <span class="pag-row-label">Diarista</span>
                <span class="pag-row-val vermelho">−${fmt(p.despDiar)}</span>
            </div>` : '',
            p.despMat > 0 ? `<div class="pag-row pag-row-sub">
                <span class="pag-row-label">Material</span>
                <span class="pag-row-val vermelho">−${fmt(p.despMat)}</span>
            </div>` : '',
        ].join('');

        const cardClass = acum >= 0 ? 'acum-pos' : 'acum-neg';
        html += `<div class="pag-parc ${cardClass}">
            <div class="pag-parc-titulo">${p.label}</div>
            <div class="pag-row">
                <span class="pag-row-label">Recebe</span>
                <span class="pag-row-val verde">${fmt(p.recebe)}</span>
            </div>
            ${carry > 0 ? `<div class="pag-row">
                <span class="pag-row-label">+ Saldo do sinal</span>
                <span class="pag-row-val verde">${fmt(carry)}</span>
            </div>` : ''}
            ${p.desp > 0 ? `<div class="pag-saidas-label">Saídas</div>${saidasRows}` : ''}
            <div class="pag-sep"></div>
            <div class="pag-row">
                <span class="pag-row-label">Saldo</span>
                <span class="pag-row-val ${cor(saldoDisp)}">${fmt(saldoDisp)}</span>
            </div>
            ${p.adriano > 0 ? (socio ? `
            <div class="pag-row">
                <span class="pag-row-label">Adriano — diária</span>
                <span class="pag-row-val amarelo">−${fmt(p.adriano / 2)}</span>
            </div>
            <div class="pag-row">
                <span class="pag-row-label">Bruno — diária</span>
                <span class="pag-row-val amarelo">−${fmt(p.adriano / 2)}</span>
            </div>` : `
            <div class="pag-row">
                <span class="pag-row-label">Adriano — diária</span>
                <span class="pag-row-val amarelo">−${fmt(p.adriano)}</span>
            </div>`) : ''}
            <div class="pag-sep"></div>
            <div class="pag-saldo-row">
                <span class="pag-saldo-label">Caixa acumulado</span>
                <span class="pag-saldo-val ${cor(acum)}">${fmt(acum)}</span>
            </div>
        </div>`;
    });

    const totalCaixa   = data.parcelas.reduce((s,p) => s + p.caixa, 0);
    const empresaFinal = totalCaixa * 0.20;
    const resumoRows   = socio ? `
        <div class="pag-row">
            <span class="pag-row-label">Adriano (40%)</span>
            <span class="pag-row-val amarelo">${fmt(totalCaixa * 0.40)}</span>
        </div>
        <div class="pag-row">
            <span class="pag-row-label">Bruno (40%)</span>
            <span class="pag-row-val amarelo">${fmt(totalCaixa * 0.40)}</span>
        </div>` : `
        <div class="pag-row">
            <span class="pag-row-label">Adriano (80%)</span>
            <span class="pag-row-val amarelo">${fmt(totalCaixa * 0.80)}</span>
        </div>`;
    html += `<div class="pag-resumo">
        <div class="pag-resumo-titulo">Divisão final</div>
        ${resumoRows}
        <div class="pag-sep"></div>
        <div class="pag-row">
            <span class="pag-row-label">Empresa (20%)</span>
            <span class="pag-row-val verde">${fmt(empresaFinal)}</span>
        </div>
    </div>`;

    document.getElementById('pagConteudo').innerHTML = html;
}
